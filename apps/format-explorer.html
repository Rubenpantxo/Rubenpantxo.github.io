<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Format Explorer 95</title>
<style>
/* ============================================================
   FORMAT EXPLORER 95 — Windows 95 aesthetic + modern CSS
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --w95-face:#c0c0c0;
  --w95-face-h:#cdcdcd;
  --w95-shadow:#808080;
  --w95-dkshadow:#0a0a0a;
  --w95-light:#dfdfdf;
  --w95-hilight:#ffffff;
  --w95-title-a:#000080;
  --w95-title-b:#1084d0;
  --w95-title-inact-a:#808080;
  --w95-title-inact-b:#b5b5b5;
  --w95-desktop:#008080;
  --w95-sel:#000080;
  --w95-sel-tx:#ffffff;
  --w95-tx:#000000;
  --w95-disabled:#808080;
  --w95-paper:#ffffff;
  --f-ui:'Tahoma','MS Sans Serif','Segoe UI',sans-serif;
  --f-mono:'Courier New',monospace;
  --ease:cubic-bezier(.2,.8,.3,1);
}
html,body{height:100%;overflow:hidden}
body{
  font:11px/1.45 var(--f-ui);color:var(--w95-tx);
  background:
    radial-gradient(ellipse 90% 70% at 50% 30%,rgba(255,255,255,.07),transparent 70%),
    repeating-conic-gradient(rgba(0,0,0,.025) 0% 25%,transparent 0% 50%) 0 0/4px 4px,
    var(--w95-desktop);
  user-select:none;
}
/* ---------- 3D bevels ---------- */
.raised{background:var(--w95-face);
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-light),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight)}
.sunken{background:var(--w95-paper);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.groove{box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
        inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight)}
/* ---------- Buttons ---------- */
.btn95{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  min-width:74px;padding:4px 12px;font:11px var(--f-ui);color:var(--w95-tx);
  background:var(--w95-face);border:none;cursor:pointer;outline:none;position:relative;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light);
  transition:background .15s var(--ease)}
.btn95:hover{background:var(--w95-face-h)}
.btn95:active,.btn95.pressed{
  box-shadow:inset 1px 1px 0 var(--w95-dkshadow),inset -1px -1px 0 var(--w95-hilight),
             inset 2px 2px 0 var(--w95-shadow),inset -2px -2px 0 var(--w95-light);
  padding:5px 11px 3px 13px}
.btn95:focus-visible{outline:1px dotted #000;outline-offset:-5px}
.btn95.small{min-width:0;padding:2px 8px}
/* ---------- Desktop icons ---------- */
#desktop{position:fixed;inset:0 0 30px 0;overflow:hidden}
.dicon{position:absolute;width:84px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px 2px;border:1px dotted transparent;transition:transform .18s var(--ease)}
.dicon:hover{transform:translateY(-2px)}
.dicon:hover .dicon-img{filter:drop-shadow(0 4px 6px rgba(0,0,0,.45)) brightness(1.06)}
.dicon.sel{border-color:rgba(255,255,255,.7)}
.dicon.sel .dicon-lbl{background:var(--w95-sel);color:#fff}
.dicon-img{width:48px;height:48px;image-rendering:pixelated;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));transition:filter .18s var(--ease)}
.dicon-lbl{font:11px var(--f-ui);color:#fff;text-align:center;padding:1px 4px;text-shadow:1px 1px 1px #000;line-height:1.25}
/* ---------- Windows ---------- */
.win{position:absolute;display:flex;flex-direction:column;min-width:280px;min-height:120px;
  background:var(--w95-face);
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-light),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight),
             6px 8px 22px rgba(0,0,0,.38);
  padding:3px;animation:win-open .22s var(--ease) both}
@keyframes win-open{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.win.closing{animation:win-close .16s var(--ease) both}
@keyframes win-close{to{opacity:0;transform:scale(.94) translateY(6px)}}
.win.minimized{display:none}
.tbar{display:flex;align-items:center;gap:5px;height:22px;padding:0 3px 0 5px;flex-shrink:0;cursor:default;
  background:linear-gradient(90deg,var(--w95-title-a),var(--w95-title-b));color:#fff}
.win.inactive>.tbar{background:linear-gradient(90deg,var(--w95-title-inact-a),var(--w95-title-inact-b))}
.tbar-ico{width:14px;height:14px;image-rendering:pixelated}
.tbar-tx{flex:1;font:bold 11px var(--f-ui);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.tbar-btns{display:flex;gap:2px}
.tbtn{width:16px;height:14px;display:grid;place-items:center;background:var(--w95-face);border:none;cursor:pointer;
  font:bold 9px 'Marlett',var(--f-ui);color:#000;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light)}
.tbtn:active{box-shadow:inset 1px 1px 0 var(--w95-dkshadow),inset -1px -1px 0 var(--w95-hilight)}
.tbtn svg{width:8px;height:8px;display:block}
.win-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.menubar{display:flex;gap:2px;padding:1px 2px;flex-shrink:0}
.menubar span{padding:2px 7px;cursor:default}
.menubar span:hover{background:var(--w95-sel);color:#fff}
.statusbar{display:flex;gap:3px;padding:2px 2px 1px;flex-shrink:0}
.status-cell{flex:1;padding:2px 8px;font:11px var(--f-ui);color:#222;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-cell.fix{flex:0 0 auto}
/* ---------- Explorer layout ---------- */
.toolbar{display:flex;align-items:center;gap:6px;padding:4px 6px;flex-shrink:0;flex-wrap:wrap;
  border-bottom:1px solid var(--w95-shadow);box-shadow:0 1px 0 var(--w95-hilight)}
.toolbar .sep{width:2px;align-self:stretch;margin:1px 2px;
  box-shadow:inset 1px 0 0 var(--w95-shadow),inset -1px 0 0 var(--w95-hilight)}
.input95{padding:3px 6px;font:11px var(--f-ui);background:var(--w95-paper);border:none;outline:none;color:#000;user-select:text;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.explorer{flex:1;display:flex;min-height:0}
.side95{width:185px;flex-shrink:0;margin:4px 0 4px 4px;overflow-y:auto;background:var(--w95-paper);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow);padding:4px 3px}
.cat95{display:flex;align-items:center;gap:6px;padding:3px 5px;cursor:pointer;white-space:nowrap;transition:background .1s}
.cat95:hover{background:#e4e4ff}
.cat95.active{background:var(--w95-sel);color:#fff}
.cat95 .ci{width:15px;text-align:center;flex-shrink:0;font-size:12px}
.cat95 .cn{flex:1;overflow:hidden;text-overflow:ellipsis}
.cat95 .cc{font:10px var(--f-mono);opacity:.75}
.main95{flex:1;margin:4px;overflow-y:auto;background:var(--w95-paper);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow);
  padding:10px;align-content:start;display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:2px 2px}
.fico{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px 5px;cursor:pointer;
  border:1px dotted transparent;text-align:center;transition:transform .15s var(--ease)}
.fico:hover{transform:translateY(-2px)}
.fico:hover .fico-img{filter:drop-shadow(0 3px 4px rgba(0,0,128,.3)) brightness(1.05)}
.fico.sel{border-color:#7f7fbf}
.fico.sel .fico-lbl{background:var(--w95-sel);color:#fff}
.fico-img{width:34px;height:40px;position:relative;transition:filter .15s var(--ease)}
.fico-lbl{font:10.5px var(--f-mono);font-weight:bold;padding:0 3px;max-width:100%;overflow:hidden;text-overflow:ellipsis}
/* page icon drawn in CSS */
.page{width:30px;height:38px;margin:0 auto;background:#fff;position:relative;border:1px solid #555;
  box-shadow:2px 2px 0 rgba(0,0,0,.18);clip-path:polygon(0 0,72% 0,100% 26%,100% 100%,0 100%)}
.page::before{content:'';position:absolute;top:0;right:0;width:28%;height:26%;background:var(--pg,#9cb4d8);border-left:1px solid #555;border-bottom:1px solid #555}
.page::after{content:'';position:absolute;left:4px;right:4px;top:14px;height:2px;background:var(--pg,#9cb4d8);
  box-shadow:0 5px 0 var(--pg,#9cb4d8),0 10px 0 var(--pg,#9cb4d8),0 15px 0 var(--pg,#9cb4d8)}
/* ---------- Properties / info ---------- */
.props{flex:1;overflow-y:auto;padding:8px;user-select:text}
.props-hero{display:flex;gap:12px;align-items:center;margin-bottom:8px;padding:10px;background:var(--w95-paper);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.props-ext{font:bold 26px var(--f-mono);color:var(--hcl,#000080)}
.props-full{font:bold 12px var(--f-ui)}
.props-cat{font:10px var(--f-ui);color:#555;margin-top:2px}
.props-desc{margin:8px 2px;line-height:1.5;font-size:11.5px}
.meta95{width:100%;border-collapse:collapse;margin:6px 0}
.meta95 td{padding:3px 8px;border-bottom:1px solid #e3e3e3;font-size:11px;vertical-align:top}
.meta95 td:first-child{font-weight:bold;color:#333;width:42%;white-space:nowrap}
.fieldset{border:none;margin:10px 2px;padding:10px 8px 8px;position:relative;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
        inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight)}
.fieldset>legend{position:absolute;top:-8px;left:8px;background:var(--w95-face);padding:0 5px;font:bold 11px var(--f-ui)}
.fieldset>.fs-body{display:flex;flex-wrap:wrap;gap:4px;padding-top:4px}
/* ---------- Tags (sistema de etiquetas) ---------- */
.tag95{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font:bold 10px var(--f-ui);cursor:pointer;
  background:var(--w95-face);transition:all .15s var(--ease);
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light)}
.tag95:hover{background:#d8d8ee;transform:translateY(-1px)}
.tag95:active{box-shadow:inset 1px 1px 0 var(--w95-dkshadow),inset -1px -1px 0 var(--w95-hilight)}
.tag95 .dot{width:7px;height:7px;border:1px solid #00000055;background:var(--tcl,#000080)}
.tag95.lang{background:#ffffd5}
.tag95.lang:hover{background:#ffffb0}
.tag95.ext-pill{font-family:var(--f-mono)}
.tag95.muted{opacity:.8;font-weight:normal}
/* ---------- Listado ventanas popup ---------- */
.poplist{flex:1;overflow-y:auto;margin:6px;background:var(--w95-paper);padding:6px;user-select:text;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.poplist .intro{font-size:11px;color:#333;margin:2px 2px 8px;line-height:1.5}
.pill-wrap{display:flex;flex-wrap:wrap;gap:4px}
/* ---------- Ecosistema IA ---------- */
.eco-wrap{flex:1;display:flex;min-height:0}
.eco-canvas{flex:1.55;position:relative;overflow:auto;margin:4px;background:var(--w95-paper);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.eco-grid{position:relative;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;padding:16px;min-width:660px}
.eco-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.eco-svg line{stroke:#000080;stroke-width:2;stroke-dasharray:6 4;opacity:.35;transition:opacity .2s,stroke .2s}
.eco-svg line.on{opacity:1;stroke:#cc0000;stroke-width:2.5;animation:dashmove 1s linear infinite}
@keyframes dashmove{to{stroke-dashoffset:-10}}
.eco-box{position:relative;z-index:1;background:var(--w95-face);padding:3px;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-light),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight)}
.eco-box-t{display:flex;align-items:center;gap:5px;padding:3px 6px;font:bold 10.5px var(--f-ui);color:#fff;
  background:linear-gradient(90deg,var(--gcl,#000080),color-mix(in srgb,var(--gcl,#000080) 55%,#9cc));text-transform:uppercase;letter-spacing:.4px}
.eco-box-b{display:flex;flex-direction:column;gap:3px;padding:6px;background:var(--w95-paper);margin:2px;
  box-shadow:inset 1px 1px 0 var(--w95-shadow),inset -1px -1px 0 var(--w95-hilight)}
.eco-item{padding:3px 7px;font:11px var(--f-ui);cursor:pointer;background:#f4f4f4;border:1px solid #999;text-align:center;
  transition:all .15s var(--ease)}
.eco-item:hover{background:#e2e2ff;border-color:var(--gcl,#000080);transform:translateX(2px)}
.eco-item.on{background:var(--gcl,#000080);color:#fff;border-color:#000;font-weight:bold}
.eco-item.linked{background:#fff3c8;border-color:#cc8800;font-weight:bold}
.eco-center{grid-column:2;display:flex;align-items:center;justify-content:center}
.eco-core{padding:16px 20px;text-align:center;cursor:pointer;background:#000835;color:#fff;border:2px solid #fff;outline:2px solid #000;
  font:bold 14px var(--f-ui);letter-spacing:.5px;transition:all .2s var(--ease);position:relative;z-index:1}
.eco-core:hover,.eco-core.on{background:#0a1a6e;box-shadow:0 0 0 3px #ffcc00,4px 6px 14px rgba(0,0,0,.4)}
.eco-core small{display:block;font:10px var(--f-ui);opacity:.75;margin-top:3px;letter-spacing:1px}
.eco-info{flex:1;display:flex;flex-direction:column;min-width:230px;max-width:330px;margin:4px 4px 4px 0;overflow:hidden}
.eco-info-body{flex:1;overflow-y:auto;background:var(--w95-paper);padding:10px;user-select:text;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow),
             inset -2px -2px 0 var(--w95-light),inset 2px 2px 0 var(--w95-dkshadow)}
.eco-info h3{font:bold 13px var(--f-ui);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.eco-info h3 .sw{width:10px;height:10px;border:1px solid #000;background:var(--gcl,#000080)}
.eco-info .role{font:10px var(--f-ui);color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.eco-info p{font-size:11.5px;line-height:1.55;margin-bottom:10px}
.eco-conn{display:flex;flex-direction:column;gap:4px}
.eco-conn-i{display:flex;gap:6px;align-items:flex-start;padding:5px 7px;background:#f6f6f6;border:1px solid #ccc;cursor:pointer;
  font-size:10.5px;line-height:1.45;transition:all .15s}
.eco-conn-i:hover{background:#e8e8ff;border-color:#000080}
.eco-conn-i b{color:#000080}
.eco-conn-i .arr{color:#cc0000;font-weight:bold;flex-shrink:0}
.eco-ex{margin-top:10px;padding:7px 9px;background:#ffffd5;border:1px solid #cfc270;font-size:10.5px;line-height:1.5}
.eco-ex b{display:block;margin-bottom:3px}
/* ---------- Stats ---------- */
.stats-body95{flex:1;overflow-y:auto;padding:10px;user-select:text}
.bar95{height:14px;background:var(--w95-paper);position:relative;flex:1;
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow)}
.bar95 i{position:absolute;inset:2px auto 2px 2px;background:repeating-linear-gradient(90deg,var(--bcl,#000080) 0 7px,transparent 7px 9px);transition:width .7s var(--ease)}
.stat-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px}
.stat-row .sn{width:130px;display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden}
.stat-row .sv{width:34px;text-align:right;font:bold 10px var(--f-mono)}
/* ---------- Taskbar ---------- */
#taskbar{position:fixed;left:0;right:0;bottom:0;height:30px;display:flex;align-items:center;gap:4px;padding:2px 4px;z-index:9000;
  background:var(--w95-face);
  box-shadow:inset 0 1px 0 var(--w95-hilight),inset 0 2px 0 var(--w95-light),0 -1px 4px rgba(0,0,0,.2)}
#startbtn{font-weight:bold;display:flex;align-items:center;gap:5px;min-width:0;padding:3px 9px}
#startbtn img{width:16px;height:16px;image-rendering:pixelated}
.taskitem{flex:0 1 170px;min-width:60px;display:flex;align-items:center;gap:6px;padding:3px 8px;font:11px var(--f-ui);
  background:var(--w95-face);border:none;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light)}
.taskitem.active{font-weight:bold;background:repeating-conic-gradient(#fff 0% 25%,#dcdcdc 0% 50%) 0 0/4px 4px;
  box-shadow:inset 1px 1px 0 var(--w95-dkshadow),inset -1px -1px 0 var(--w95-hilight),
             inset 2px 2px 0 var(--w95-shadow),inset -2px -2px 0 var(--w95-light)}
#clock{margin-left:auto;padding:3px 10px;font:11px var(--f-ui);
  box-shadow:inset -1px -1px 0 var(--w95-hilight),inset 1px 1px 0 var(--w95-shadow)}
/* ---------- Start menu ---------- */
#startmenu{position:fixed;left:4px;bottom:32px;width:210px;z-index:9500;display:none;flex-direction:row;
  background:var(--w95-face);padding:3px;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-light),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-hilight),
             5px 6px 16px rgba(0,0,0,.4);
  animation:menu-in .18s var(--ease) both}
@keyframes menu-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#startmenu.open{display:flex}
.sm-band{width:24px;background:linear-gradient(180deg,#1084d0,#000080);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
.sm-band span{writing-mode:vertical-rl;transform:rotate(180deg);color:#fff;font:bold 13px var(--f-ui);letter-spacing:1px}
.sm-items{flex:1;display:flex;flex-direction:column;padding:2px}
.sm-i{display:flex;align-items:center;gap:9px;padding:7px 8px;cursor:pointer;font:11px var(--f-ui)}
.sm-i:hover{background:var(--w95-sel);color:#fff}
.sm-i .ic{font-size:16px;width:20px;text-align:center}
.sm-sep{height:2px;margin:2px 4px;box-shadow:inset 0 1px 0 var(--w95-shadow),inset 0 -1px 0 var(--w95-hilight)}
/* ---------- Scrollbars Win95 ---------- */
::-webkit-scrollbar{width:16px;height:16px}
::-webkit-scrollbar-track{background:repeating-conic-gradient(#fff 0% 25%,#c0c0c0 0% 50%) 0 0/2px 2px}
::-webkit-scrollbar-thumb{background:var(--w95-face);
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light)}
::-webkit-scrollbar-button:single-button{display:block;background:var(--w95-face);height:16px;width:16px;
  box-shadow:inset -1px -1px 0 var(--w95-dkshadow),inset 1px 1px 0 var(--w95-hilight),
             inset -2px -2px 0 var(--w95-shadow),inset 2px 2px 0 var(--w95-light)}
::selection{background:var(--w95-sel);color:#fff}
/* ---------- Tooltip ---------- */
#tip95{position:fixed;z-index:9999;display:none;padding:3px 7px;background:#ffffe1;border:1px solid #000;font:11px var(--f-ui);pointer-events:none;max-width:260px}
@media(max-width:760px){.side95{width:128px}.eco-info{display:none}}
</style>
</head>
<body>

let zTop=100, winCount=0;
const wins={};
function mkWin(id,title,icon,w,h,contentHTML,opts={}){
  if(wins[id]){focusWin(id);return wins[id]}
  const el=document.createElement('div');
  el.className='win';el.id='win-'+id;
  const desk=document.getElementById('desktop');
  const dw=desk.clientWidth,dh=desk.clientHeight;
  const W=Math.min(w,dw-16),H=Math.min(h,dh-16);
  el.style.width=W+'px';el.style.height=H+'px';
  el.style.left=Math.max(4,(dw-W)/2+(winCount%5)*24-48)+'px';
  el.style.top=Math.max(4,(dh-H)/2+(winCount%5)*18-36)+'px';
  winCount++;
  el.innerHTML=`<div class="tbar"><span style="font-size:12px">${icon}</span><span class="tbar-tx">${esc(title)}</span>
    <span class="tbar-btns">
      <button class="tbtn" data-act="min" title="Minimizar"><svg viewBox="0 0 8 8"><rect x="0" y="6" width="6" height="2" fill="#000"/></svg></button>
      <button class="tbtn" data-act="max" title="Maximizar"><svg viewBox="0 0 8 8"><rect x="0" y="0" width="8" height="8" fill="none" stroke="#000" stroke-width="1.6"/></svg></button>
      <button class="tbtn" data-act="close" title="Cerrar"><svg viewBox="0 0 8 8"><path d="M0 0 L8 8 M8 0 L0 8" stroke="#000" stroke-width="1.6"/></svg></button>
    </span></div>
    <div class="win-body">${contentHTML}</div>`;
  desk.appendChild(el);
  wins[id]={el,title,icon,max:false,prev:null};
  // taskbar
  const ti=document.createElement('button');
  ti.className='taskitem';ti.id='task-'+id;
  ti.innerHTML=`<span>${icon}</span><span style="overflow:hidden;text-overflow:ellipsis">${esc(title)}</span>`;
  ti.onclick=()=>{const w=wins[id];if(!w)return;
    if(w.el.classList.contains('minimized')){w.el.classList.remove('minimized');focusWin(id)}
    else if(w.el.classList.contains('focused')){w.el.classList.add('minimized');ti.classList.remove('active')}
    else focusWin(id)};
  document.getElementById('taskitems').appendChild(ti);
  // controls
  el.querySelector('[data-act=close]').onclick=e=>{e.stopPropagation();closeWin(id)};
  el.querySelector('[data-act=min]').onclick=e=>{e.stopPropagation();el.classList.add('minimized');ti.classList.remove('active')};
  el.querySelector('[data-act=max]').onclick=e=>{e.stopPropagation();toggleMax(id)};
  el.addEventListener('pointerdown',()=>focusWin(id));
  // drag
  const tb=el.querySelector('.tbar');
  tb.addEventListener('pointerdown',ev=>{
    if(ev.target.closest('.tbtn')||wins[id].max)return;
    const sx=ev.clientX-el.offsetLeft,sy=ev.clientY-el.offsetTop;
    const mv=e2=>{el.style.left=Math.max(-W+80,Math.min(dw-40,e2.clientX-sx))+'px';
                  el.style.top=Math.max(0,Math.min(dh-26,e2.clientY-sy))+'px'};
    const up=()=>{removeEventListener('pointermove',mv);removeEventListener('pointerup',up)};
    addEventListener('pointermove',mv);addEventListener('pointerup',up);
  });
  tb.addEventListener('dblclick',e=>{if(!e.target.closest('.tbtn'))toggleMax(id)});
  focusWin(id);
  if(opts.onOpen)opts.onOpen(el);
  return wins[id];
}
function focusWin(id){
  Object.entries(wins).forEach(([k,w])=>{w.el.classList.add('inactive');w.el.classList.remove('focused');
    const t=document.getElementById('task-'+k);if(t)t.classList.remove('active')});
  const w=wins[id];if(!w)return;
  w.el.classList.remove('inactive','minimized');w.el.classList.add('focused');
  w.el.style.zIndex=++zTop;
  const t=document.getElementById('task-'+id);if(t)t.classList.add('active');
}
function closeWin(id){
  const w=wins[id];if(!w)return;
  w.el.classList.add('closing');
  setTimeout(()=>{w.el.remove();const t=document.getElementById('task-'+id);if(t)t.remove();delete wins[id]},160);
}
function toggleMax(id){
  const w=wins[id],el=w.el,desk=document.getElementById('desktop');
  if(!w.max){w.prev={l:el.style.left,t:el.style.top,w:el.style.width,h:el.style.height};
    el.style.left='0';el.style.top='0';el.style.width=desk.clientWidth+'px';el.style.height=desk.clientHeight+'px';w.max=true}
  else{Object.assign(el.style,{left:w.prev.l,top:w.prev.t,width:w.prev.w,height:w.prev.h});w.max=false}
}

// delegación de clics en etiquetas dentro de una ventana
function wire(el){
  el.addEventListener('click',e=>{

  });

      <div class="eco-ex"><b>💡 Ejemplo de flujo completo:</b>NPM instala Three.js → tu .html la importa → Three.js carga un modelo .gltf → publicas en GitHub Pages → jsDelivr la sirve por CDN.</div>
    </div></div>
  </div>`;
  mkWin('eco','Ecosistema de recursos para un Modelo de IA','🧠',980,640,html,{onOpen:el=>{
    drawEcoLines(el);
    el.querySelector('#eco-grid').addEventListener('click',e=>{
      const core=e.target.closest('#eco-core');
      const it=e.target.closest('.eco-item');

function drawEcoLines(el,activeGroups){
  const grid=el.querySelector('#eco-grid'),svg=el.querySelector('#eco-svg');
  if(!grid||!svg)return;
  const gr=grid.getBoundingClientRect();
  const core=el.querySelector('#eco-core').getBoundingClientRect();
  const cx=core.left-gr.left+core.width/2, cy=core.top-gr.top+core.height/2;
  svg.setAttribute('viewBox',`0 0 ${gr.width} ${gr.height}`);
  svg.innerHTML=Object.keys(ECO_GROUPS).map(g=>{
    const b=el.querySelector('#eco-box-'+g).getBoundingClientRect();
    const bx=b.left-gr.left+b.width/2, by=b.top-gr.top+b.height/2;
    const on=activeGroups&&activeGroups.has(g)?' class="on"':'';
    return `<line x1="${cx}" y1="${cy}" x2="${bx}" y2="${by}"${on}/>`;
  }).join('');
}
function selectEcoCore(el){
  el.querySelectorAll('.eco-item').forEach(x=>x.classList.remove('on','linked'));
  el.querySelector('#eco-core').classList.add('on');
  drawEcoLines(el,new Set(Object.keys(ECO_GROUPS)));
  el.querySelector('#eco-info').innerHTML=`
    <h3>🧠 ${esc(ECO_CORE.n)}</h3><div class="role">Orquestador del ecosistema</div>
    <p>${esc(ECO_CORE.d)}</p>
    <div style="font:bold 10px var(--f-ui);color:#555;margin-bottom:5px">CONEXIONES:</div>
    <div class="eco-conn">${ECO_CORE.conns.map(c=>`<div class="eco-conn-i"><span class="arr">→</span><span><b>${esc(c[0])}</b> ${esc(c[1])}: ${esc(c[2])}</span></div>`).join('')}</div>`;
}
function selectEco(el,name){
  const item=ECO[name];if(!item)return;
  const G=ECO_GROUPS[item.g];
  el.querySelector('#eco-core').classList.remove('on');
  el.querySelectorAll('.eco-item').forEach(x=>{
    x.classList.toggle('on',x.dataset.eco===name);
    x.classList.remove('linked');
  });
  const groups=new Set([item.g]);
  (item.c||[]).forEach(c=>{
    groups.add(c[2]);
    el.querySelectorAll('.eco-item').forEach(x=>{
      if(x.dataset.eco===c[0]||c[0].split(' / ').includes(x.dataset.eco))x.classList.add('linked');
    });
  });
  drawEcoLines(el,groups);
  const extLink=item.ext?` <span class="tag95 ext-pill" data-ext="${item.ext}" style="margin-left:6px">ficha .${item.ext.toLowerCase()}</span>`:'';
  el.querySelector('#eco-info').innerHTML=`
    <h3 style="--gcl:${G.cl}"><span class="sw"></span>${esc(name)}${extLink}</h3>
    <div class="role">${esc(G.n)}</div>
    <p>${esc(item.d)}</p>
    <div style="font:bold 10px var(--f-ui);color:#555;margin-bottom:5px">CONECTA CON:</div>
    <div class="eco-conn">${(item.c||[]).map(c=>{
      const target=ECO[c[0]]?c[0]:null;
      return `<div class="eco-conn-i"${target?` data-eco-link="${esc(target)}"`:''}><span class="arr">→</span><span><b>${esc(c[0])}</b> — ${esc(c[1])}</span></div>`;
    }).join('')}</div>
    ${item.ex?`<div class="eco-ex"><b>💡 Ejemplo:</b>${esc(item.ex)}</div>`:''}`;
}

// ---------------- Start menu + clock ----------------
function initShell(){
  const sm=document.getElementById('sm-items');
  sm.innerHTML=DICONS.map(d=>`<div class="sm-i" data-run="${d.id}"><span class="ic">${{explorer:'🗄️',eco:'🧠',stats:'📊',about:'❓'}[d.id]}</span>${esc(d.n)}</div>`).join('')
    +`<div class="sm-sep"></div><div class="sm-i" data-run="__web"><span class="ic">🌍</span>rubenpantxo.com</div>`;
  sm.addEventListener('click',e=>{
    const i=e.target.closest('.sm-i');if(!i)return;
    document.getElementById('startmenu').classList.remove('open');
    if(i.dataset.run==='__web'){location.href='https://rubenpantxo.com';return}
    DICONS.find(d=>d.id===i.dataset.run)?.run();
  });
  const sb=document.getElementById('startbtn');
  sb.onclick=e=>{e.stopPropagation();document.getElementById('startmenu').classList.toggle('open');sb.classList.toggle('pressed')};
  document.addEventListener('click',e=>{
    if(!e.target.closest('#startmenu')&&!e.target.closest('#startbtn')){
      document.getElementById('startmenu').classList.remove('open');sb.classList.remove('pressed')}
  });
  const tick=()=>{const d=new Date();document.getElementById('clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')};
  tick();setInterval(tick,10000);
}
renderDesktop();
initShell();
openExplorer();
</script>
</body>
