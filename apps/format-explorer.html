<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Format Explorer · Atelier Sienna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === ATELIER SIENNA — see DESIGN.md === */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Surfaces */
  --bg-0:#FBF7EF;          /* limestone page */
  --bg-1:#F5EFE3;          /* surface-raised: sidebar / app strip / center */
  --bg-2:#FFFFFF;          /* paper card */
  --bg-3:#EFE8D9;          /* surface-sunken: inputs, table heads, chips */
  --bg-4:#E8DFC8;
  --bg-card:#FFFFFF;
  --bg-card-h:#FCF9F3;
  --bg-glass:rgba(251,247,239,.92); /* matte, not glass */
  /* Ink */
  --tx-0:#1A1816;          /* primary ink */
  --tx-1:#2E2A25;          /* body */
  --tx-2:#5C5750;          /* secondary */
  --tx-3:#7C7468;          /* muted */
  --tx-4:#A89E8C;          /* faint */
  /* Borders */
  --bd:#E5DCC8;
  --bd-h:#CFC2A4;
  --bd-acc:#CFC2A4;
  /* Accents — sienna is the only interaction color.
     The "c-*" variable names are kept for back-compat with existing JSX
     references; their values are now warm-palette equivalents. */
  --c-cyan:#B0432A;        /* PRIMARY → Boston Clay (sienna) */
  --c-purple:#6B4076;      /* plum */
  --c-pink:#D26244;        /* coral */
  --c-green:#5D7339;       /* sage */
  --c-amber:#C8901C;       /* saffron */
  --c-red:#8C2A30;         /* wine */
  --c-blue:#3F6F9A;        /* sky */
  --c-orange:#D26244;      /* coral (alias) */
  --c-brown:#7E5634;       /* earth */
  --c-lime:#476939;        /* moss */
  /* Tints — used for soft-ink backgrounds (focus rings, chips) */
  --gl-cyan:rgba(176,67,42,.10);
  --gl-purple:rgba(107,64,118,.09);
  --gl-green:rgba(93,115,57,.10);
  --gl-amber:rgba(200,144,28,.12);
  /* Shadows — warm, paper-physical */
  --shadow-1:0 1px 0 rgba(26,24,22,.04),0 1px 2px rgba(26,24,22,.06);
  --shadow-2:0 4px 14px rgba(26,24,22,.09),0 1px 2px rgba(26,24,22,.05);
  --shadow-3:0 24px 50px rgba(26,24,22,.18),0 6px 14px rgba(26,24,22,.08);
  /* Accent fill — solid sienna (kept var name for back-compat) */
  --grad-acc:#B0432A;
  --grad-soft:linear-gradient(135deg,rgba(176,67,42,.06),rgba(176,67,42,.02));
  --ease:cubic-bezier(.4,0,.2,1);--ease-bounce:cubic-bezier(.34,1.56,.64,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-0);color:var(--tx-1);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 8% 4%,rgba(176,67,42,.025),transparent 65%),
    radial-gradient(ellipse 50% 60% at 92% 96%,rgba(126,86,52,.03),transparent 70%);
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(26,24,22,.05) 1px,transparent 1px);
  background-size:3px 3px;opacity:.35;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 35%,transparent 80%);
}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* === HEADER === */
.hdr{display:flex;align-items:center;gap:18px;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--bg-glass);flex-shrink:0;position:relative;z-index:20}
.hdr::after{content:'';position:absolute;left:24px;right:24px;bottom:-1px;height:2px;background:var(--c-cyan);opacity:.5;border-radius:2px;width:42px}
.brand{display:flex;align-items:center;gap:13px}
.brand-mark{width:42px;height:42px;border-radius:8px;background:var(--bg-0);display:grid;place-items:center;font:600 18px/1 'Fraunces',serif;color:var(--c-cyan);letter-spacing:-.04em;border:1.5px solid var(--c-cyan);box-shadow:inset 0 -2px 0 var(--c-cyan)}
.brand-tx h1{font:600 20px/1.05 'Fraunces',serif;letter-spacing:-.025em;color:var(--tx-0)}
.brand-tx p{font:600 9px/1 'Inter',sans-serif;color:var(--tx-3);letter-spacing:.18em;text-transform:uppercase;margin-top:5px}

.search{position:relative;flex:1;max-width:540px;margin:0 auto}
.search input{width:100%;padding:11px 50px 11px 42px;background:var(--bg-3);border:1px solid transparent;border-radius:6px;color:var(--tx-0);font:400 14px/1 'Inter';outline:none;transition:all .25s var(--ease)}
.search input:focus{border-color:var(--c-cyan);background:var(--bg-2);box-shadow:0 0 0 3px var(--gl-cyan)}
.search input::placeholder{color:var(--tx-3)}
.search-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--tx-3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;transition:stroke .25s}
.search input:focus~.search-ic{stroke:var(--c-cyan)}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font:600 10px/1 'JetBrains Mono',monospace;color:var(--tx-3);background:var(--bg-2);padding:4px 7px;border-radius:4px;border:1px solid var(--bd);pointer-events:none}

.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-btn{height:38px;padding:0 14px;border-radius:6px;background:transparent;border:1px solid var(--bd);color:var(--tx-1);font:500 12px/1 'Inter';cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s var(--ease);outline:none}
.hdr-btn:hover{background:var(--bg-3);border-color:var(--bd-h);color:var(--tx-0)}
.hdr-btn:focus-visible{box-shadow:0 0 0 3px var(--gl-cyan);border-color:var(--c-cyan)}
.hdr-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-btn.icon-only{width:38px;padding:0;justify-content:center}
.hdr-btn.primary{background:var(--c-cyan);color:#FFFFFF;border-color:var(--c-cyan);font-weight:600;box-shadow:var(--shadow-1)}
.hdr-btn.primary:hover{background:#92341E;border-color:#92341E;color:#FFFFFF;transform:translateY(-1px);box-shadow:var(--shadow-2)}

/* === BODY LAYOUT === */
.body{flex:1;display:flex;overflow:hidden;min-height:0}

/* === SIDEBAR === */
.side{width:236px;min-width:236px;background:var(--bg-1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.side-h{padding:20px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.side-h-tx{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);letter-spacing:.16em;text-transform:uppercase}
.side-h-ct{font:600 11px/1 'JetBrains Mono',monospace;color:var(--tx-2);background:var(--bg-2);padding:3px 8px;border-radius:4px;border:1px solid var(--bd)}
.side-list{flex:1;overflow-y:auto;padding:0 10px 8px}
.cat{display:flex;align-items:center;gap:11px;padding:9px 11px;cursor:pointer;border-radius:6px;position:relative;transition:all .18s var(--ease);margin-bottom:1px;border:1px solid transparent}
.cat:hover{background:var(--bg-2)}
.cat.active{background:var(--bg-2);border-color:var(--bd);box-shadow:inset 3px 0 0 var(--cat-cl,var(--c-cyan)),var(--shadow-1)}
.cat.active .cat-name{color:var(--tx-0);font-weight:600}
.cat-ico{width:28px;height:28px;border-radius:5px;display:grid;place-items:center;font-size:14px;flex-shrink:0;background:color-mix(in srgb,var(--cat-cl,var(--c-cyan)) 14%,var(--bg-2));border:1px solid color-mix(in srgb,var(--cat-cl,var(--c-cyan)) 28%,var(--bd));transition:all .2s var(--ease)}
.cat:hover .cat-ico{transform:scale(1.04)}
.cat-name{flex:1;font:500 13px/1.2 'Inter';color:var(--tx-1);transition:color .2s}
.cat-count{font:600 10px/1 'JetBrains Mono',monospace;color:var(--tx-3);min-width:24px;text-align:right}
.cat-info{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:var(--bg-3);border:1px solid var(--bd);color:var(--tx-3);cursor:pointer;font:700 9px/1 'Inter',sans-serif;display:none;align-items:center;justify-content:center;transition:all .2s}
.cat:hover .cat-info{display:flex}
.cat-info:hover{background:var(--cat-cl,var(--c-cyan));color:#FFFFFF;border-color:var(--cat-cl,var(--c-cyan));transform:translateY(-50%) scale(1.1)}

.side-foot{padding:12px 14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;background:var(--bg-1)}
.side-stat{display:flex;justify-content:space-between;align-items:center;font:500 11px/1 'Inter',sans-serif;color:var(--tx-3)}
.side-stat strong{color:var(--tx-0);font-weight:600;font-family:'JetBrains Mono',monospace}

/* === CENTER === */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg-0)}
.cnt-h{padding:18px 26px;display:flex;align-items:flex-end;gap:16px;border-bottom:1px solid var(--bd);background:var(--bg-0);flex-shrink:0}
.cnt-title{font:600 26px/1.05 'Fraunces',serif;color:var(--tx-0);letter-spacing:-.02em}
.cnt-title small{display:block;font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);letter-spacing:.16em;text-transform:uppercase;margin-top:8px;font-weight:600}
.cnt-h-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{padding:6px 12px;border-radius:999px;background:var(--bg-3);border:1px solid var(--bd);color:var(--tx-2);font:500 11px/1 'Inter';display:flex;align-items:center;gap:6px;transition:all .2s}
.chip strong{color:var(--tx-0);font-weight:700;font-family:'JetBrains Mono',monospace}

/* === EXTENSION GRID === */
.cnt-body{flex:1;overflow-y:auto;padding:20px 26px 12px;scrollbar-gutter:stable}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px}
.ext{position:relative;padding:13px 6px;text-align:center;font:600 12.5px/1 'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em;color:var(--tx-1);background:var(--bg-card);border:1px solid var(--bd);border-radius:6px;cursor:pointer;overflow:hidden;transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .18s,color .18s,background .2s;animation:fade-up .22s var(--ease) both;outline:none;box-shadow:var(--shadow-1)}
.ext::before{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:opacity .25s;pointer-events:none}
.ext span{position:relative;z-index:1}
.ext-pop{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--tx-4);opacity:.5}
.ext-pop.high{background:var(--c-amber);opacity:1}
.ext:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:var(--bd-h);color:var(--tx-0)}
.ext:hover::before{opacity:.6}
.ext:focus-visible{box-shadow:0 0 0 3px var(--gl-cyan);border-color:var(--c-cyan)}
.ext.sel{border-color:var(--c-cyan);color:var(--c-cyan);background:#FFFFFF;box-shadow:0 0 0 1.5px var(--c-cyan),var(--shadow-2)}
.ext.hl{border-color:var(--app-cl,var(--c-cyan));color:var(--app-cl,var(--c-cyan));background:color-mix(in srgb,var(--app-cl,var(--c-cyan)) 7%,var(--bg-card));box-shadow:0 0 0 1px color-mix(in srgb,var(--app-cl,var(--c-cyan)) 60%,transparent),var(--shadow-1)}
.ext.dim{opacity:.36;filter:saturate(.5)}
@keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.cnt-body-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--tx-3);text-align:center}
.cnt-body-empty svg{width:48px;height:48px;margin-bottom:14px;stroke:var(--tx-4);fill:none;stroke-width:1.5}
.cnt-body-empty h3{font:600 19px/1.3 'Fraunces',serif;color:var(--tx-1);margin-bottom:6px;letter-spacing:-.015em}
.cnt-body-empty p{font:400 13px/1.55 'Inter';max-width:360px;color:var(--tx-2)}

/* === APP STRIP === */
.app-strip{border-top:1px solid var(--bd);background:var(--bg-1);flex-shrink:0;display:flex;flex-direction:column}
.app-strip-h{padding:12px 26px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--bd)}
.app-strip-h-l{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);letter-spacing:.16em;text-transform:uppercase}
.app-search{position:relative;width:220px}
.app-search input{width:100%;padding:7px 12px 7px 30px;background:var(--bg-2);border:1px solid var(--bd);border-radius:5px;color:var(--tx-1);font:400 12px/1 'Inter';outline:none;transition:all .2s}
.app-search input:focus{border-color:var(--c-cyan);box-shadow:0 0 0 2px var(--gl-cyan)}
.app-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--tx-3);fill:none;stroke-width:2;pointer-events:none}
.app-strip-h-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.app-mini-btn{width:28px;height:28px;border-radius:5px;background:var(--bg-2);border:1px dashed var(--bd-h);color:var(--tx-2);cursor:pointer;display:grid;place-items:center;font-size:14px;transition:all .2s var(--ease);outline:none}
.app-mini-btn:hover{border-color:var(--c-cyan);border-style:solid;color:var(--c-cyan);background:var(--gl-cyan)}
.app-mini-btn:focus-visible{box-shadow:0 0 0 2px var(--gl-cyan)}
.app-mini-btn.ghost:hover{transform:none}
.app-list{display:flex;gap:8px;padding:12px 26px;overflow-x:auto;scrollbar-width:none}
.app-list::-webkit-scrollbar{display:none}
.app-card{position:relative;flex-shrink:0;display:flex;align-items:center;gap:9px;padding:8px 14px 8px 12px;border-radius:6px;background:var(--bg-2);border:1px solid var(--bd);cursor:pointer;overflow:hidden;transition:all .2s var(--ease);outline:none;min-width:114px;box-shadow:var(--shadow-1)}
.app-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--app-cl);opacity:0;transition:opacity .25s}
.app-card:hover{transform:translateY(-1px);border-color:var(--bd-h);box-shadow:var(--shadow-2)}
.app-card:hover::before{opacity:.45}
.app-card:focus-visible{box-shadow:0 0 0 2px var(--gl-cyan);border-color:var(--c-cyan)}
.app-card.act{border-color:var(--app-cl);background:color-mix(in srgb,var(--app-cl) 4%,var(--bg-2));box-shadow:0 0 0 1px var(--app-cl),var(--shadow-1)}
.app-card.act::before{opacity:1}
.app-card.act .app-name{color:var(--app-cl);font-weight:600}
.app-dot{width:8px;height:8px;border-radius:50%;background:var(--app-cl);flex-shrink:0;position:relative;z-index:1}
.app-name{font:500 13px/1 'Inter';color:var(--tx-1);position:relative;z-index:1;white-space:nowrap;transition:color .2s}
.app-cov{font:600 9px/1 'JetBrains Mono',monospace;color:var(--tx-3);position:relative;z-index:1;background:var(--bg-3);padding:2px 5px;border-radius:3px;letter-spacing:.04em}
.app-card.act .app-cov{color:var(--app-cl);background:color-mix(in srgb,var(--app-cl) 15%,var(--bg-3))}
.app-card-rm{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--bg-3);border:none;color:var(--tx-3);font:700 9px/1 'Inter',sans-serif;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.app-card:hover .app-card-rm{display:flex}
.app-card-rm:hover{background:var(--c-red);color:#FFFFFF}

/* === RIGHT INFO PANEL === */
.info{width:0;min-width:0;overflow:hidden;background:var(--bg-0);border-left:1px solid var(--bd);transition:width .35s var(--ease),min-width .35s var(--ease);display:flex;flex-direction:column}
.info.open{width:400px;min-width:400px}
.info-inner{flex:1;overflow-y:auto;padding:0 0 18px}
.info-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:var(--bg-2);border:1px solid var(--bd);color:var(--tx-3);cursor:pointer;display:grid;place-items:center;font-size:14px;z-index:5;transition:all .2s;outline:none}
.info-close:hover{border-color:var(--c-red);color:var(--c-red);background:#FFFFFF}
.info-hero{position:relative;padding:26px 24px 20px;margin:16px 16px 0;border-radius:10px;background:var(--bg-2);border:1px solid var(--bd);overflow:hidden;box-shadow:var(--shadow-1)}
.info-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cat-cl,var(--c-cyan))}
.info-hero::after{display:none}
.info-ext{font:600 44px/1 'Fraunces',serif;color:var(--cat-cl,var(--c-cyan));margin-bottom:8px;letter-spacing:-.04em;font-variation-settings:"opsz" 144}
.info-cat{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.18em;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.info-cat-dot{width:7px;height:7px;border-radius:50%;background:var(--cat-cl,var(--c-cyan))}
.info-name{font:600 19px/1.25 'Fraunces',serif;color:var(--tx-0);margin-bottom:10px;letter-spacing:-.018em}
.info-desc{font:400 13.5px/1.6 'Inter';color:var(--tx-1);margin-bottom:8px}
.info-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px}
.info-tag{font:600 9.5px/1 'Inter',sans-serif;color:var(--tx-2);background:var(--bg-3);border:1px solid var(--bd);padding:4px 8px;border-radius:3px;letter-spacing:.1em;text-transform:uppercase}
.info-tag.acc{color:#FFFFFF;border-color:var(--c-cyan);background:var(--c-cyan)}
.info-tag.warn{color:#7A5A0F;border-color:#E8C97D;background:#FBEFD4}
.info-tag.dead{color:#7A2226;border-color:#E1B5B7;background:#F4D9D9}

.info-pop{margin-top:18px;display:flex;align-items:center;gap:10px}
.info-pop-l{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.14em}
.info-pop-bar{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;position:relative}
.info-pop-bar-fill{height:100%;background:var(--cat-cl,var(--c-cyan));border-radius:2px;transition:width .6s var(--ease)}
.info-pop-v{font:600 11px/1 'JetBrains Mono',monospace;color:var(--tx-0);min-width:30px;text-align:right}

.info-meta{margin:16px;padding:0;background:var(--bg-2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-1)}
.meta-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bd);transition:background .15s}
.meta-row:last-child{border-bottom:none}
.meta-row:hover{background:var(--bg-card-h)}
.meta-k{font:600 10px/1.2 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.14em}
.meta-v{font:500 12px/1.3 'JetBrains Mono',monospace;color:var(--tx-0);text-align:right;max-width:60%}
.meta-v.mono-sm{font-size:11px}

.info-rec{margin:16px;padding:16px 18px;border-radius:8px;background:var(--bg-2);border:1px solid var(--bd);border-left:3px solid var(--c-green);position:relative;overflow:hidden;cursor:pointer;transition:all .2s var(--ease);box-shadow:var(--shadow-1)}
.info-rec:hover{border-color:var(--c-green);border-left-color:var(--c-green);transform:translateY(-1px);box-shadow:var(--shadow-2)}
.info-rec-l{font:700 9.5px/1 'Inter',sans-serif;color:var(--c-green);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.info-rec-name{font:600 17px/1.2 'Fraunces',serif;color:var(--tx-0);margin-bottom:6px;display:flex;align-items:center;gap:9px;letter-spacing:-.015em}
.info-rec-name .ad{width:9px;height:9px;border-radius:50%;background:var(--app-cl)}
.info-rec-reason{font:400 12px/1.5 'Inter';color:var(--tx-2)}

.info-section{margin:0 16px 16px}
.info-section-h{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-section-h::before{content:'';width:3px;height:11px;background:var(--cat-cl,var(--c-cyan));border-radius:1.5px}
.app-comp-list{display:flex;flex-direction:column;gap:4px}
.app-comp-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;background:var(--bg-2);border:1px solid var(--bd);cursor:pointer;transition:all .18s;outline:none;box-shadow:var(--shadow-1)}
.app-comp-item:hover{border-color:var(--bd-h);transform:translateX(2px);background:#FFFFFF;box-shadow:var(--shadow-2)}
.app-comp-item:focus-visible{box-shadow:0 0 0 2px var(--gl-cyan);border-color:var(--c-cyan)}
.app-comp-item .ad{width:8px;height:8px;border-radius:50%;background:var(--app-cl);flex-shrink:0}
.app-comp-name{font:500 13px/1 'Inter';color:var(--tx-0);flex:1}
.app-comp-tag{font:600 9px/1 'Inter',sans-serif;background:var(--bg-3);padding:3px 7px;border-radius:3px;color:var(--tx-2);text-transform:uppercase;letter-spacing:.1em}

.alt-list{display:flex;flex-direction:column;gap:4px}
.alt-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:5px;background:#FBEFD4;border:1px solid #E8C97D;font:400 12px/1.2 'Inter';color:#5C4505}
.alt-item::before{content:'★';color:var(--c-amber);font-size:11px}

.related-list{display:flex;flex-wrap:wrap;gap:5px}
.related-pill{padding:5px 10px;font:600 10.5px/1 'JetBrains Mono',monospace;background:var(--bg-3);border:1px solid var(--bd);border-radius:4px;cursor:pointer;color:var(--tx-1);transition:all .18s;outline:none;letter-spacing:.04em}
.related-pill:hover{border-color:var(--c-cyan);color:var(--c-cyan);background:#FFFFFF;transform:translateY(-1px)}

/* === MODAL === */
.overlay{position:fixed;inset:0;background:rgba(26,24,22,.45);z-index:300;display:flex;align-items:center;justify-content:center;animation:fade-in .2s var(--ease);padding:24px}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-0);border:1px solid var(--bd);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-3);animation:modal-in .3s var(--ease-bounce);max-height:88vh}
@keyframes modal-in{from{transform:translateY(20px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg-2)}
.modal-t{font:600 19px/1.2 'Fraunces',serif;display:flex;align-items:center;gap:10px;letter-spacing:-.018em;color:var(--tx-0)}
.modal-t small{font:600 11px/1 'Inter',sans-serif;color:var(--tx-3);font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.modal-c{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd);background:transparent;color:var(--tx-2);cursor:pointer;font-size:14px;display:grid;place-items:center;transition:all .18s;outline:none}
.modal-c:hover{border-color:var(--c-red);color:var(--c-red);background:#FFFFFF}
.modal-b{flex:1;overflow:auto;min-height:0;background:var(--bg-0)}

/* Comparison Table */
.cmp-modal{width:96%;max-width:1140px}
.cmp-toolbar{padding:14px 24px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--bd);background:var(--bg-1);flex-wrap:wrap}
.cmp-search{flex:1;min-width:160px;max-width:280px;position:relative}
.cmp-search input{width:100%;padding:8px 12px 8px 30px;background:var(--bg-2);border:1px solid var(--bd);border-radius:5px;color:var(--tx-0);font:400 12px/1 'Inter';outline:none}
.cmp-search input:focus{border-color:var(--c-cyan);box-shadow:0 0 0 2px var(--gl-cyan)}
.cmp-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--tx-3);fill:none;stroke-width:2}
.cmp-stat{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.14em;display:flex;align-items:center;gap:8px}
.cmp-stat strong{color:var(--tx-0);font-family:'JetBrains Mono',monospace}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto;background:var(--bg-2)}
.tbl th{padding:12px 16px;text-align:left;background:var(--bg-3);color:var(--tx-2);font:600 10px/1.1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.14em;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:1;white-space:nowrap}
.tbl td{padding:10px 16px;border-bottom:1px solid var(--bd);color:var(--tx-1);font:400 12.5px/1.4 'Inter';vertical-align:middle}
.tbl td:first-child{font:700 12px/1 'JetBrains Mono',monospace;color:var(--tx-0);white-space:nowrap;letter-spacing:.04em}
.tbl tr:hover td{background:var(--bg-card-h)}
.tbl tr.subhead td{background:var(--bg-3);color:var(--cat-cl,var(--c-cyan))!important;font:700 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.18em;padding:10px 16px;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.tbl tr.subhead td::before{content:'◆  '}
.tbl-cell-y{color:var(--c-green)!important;font-weight:600}
.tbl-cell-n{color:var(--c-red)!important;opacity:.65}
.tbl-cell-mut{color:var(--tx-3)!important}

/* Add app modal */
.add-modal{width:520px;max-width:96%;max-height:88vh}
.add-body{padding:24px;overflow-y:auto;flex:1;background:var(--bg-2)}
.field{margin-bottom:18px}
.field-l{display:block;font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:9px}
.field-input{width:100%;padding:10px 14px;background:var(--bg-3);border:1px solid var(--bd);border-radius:5px;color:var(--tx-0);font:400 14px 'Inter';outline:none;transition:all .2s}
.field-input:focus{border-color:var(--c-cyan);background:#FFFFFF;box-shadow:0 0 0 3px var(--gl-cyan)}
.swatches{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
.swatch{aspect-ratio:1;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .18s var(--ease);outline:none;box-shadow:var(--shadow-1)}
.swatch:hover{transform:scale(1.15)}
.swatch:focus-visible{box-shadow:0 0 0 2px var(--c-cyan)}
.swatch.sel{border-color:var(--bg-2);box-shadow:0 0 0 2px currentColor,var(--shadow-1)}
.fmt-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:220px;overflow-y:auto;padding:8px;border:1px solid var(--bd);background:var(--bg-3);border-radius:6px}
.fmt-pill{padding:5px 10px;font:600 10px/1 'JetBrains Mono',monospace;text-transform:uppercase;background:var(--bg-2);border:1px solid var(--bd);border-radius:4px;cursor:pointer;color:var(--tx-2);transition:all .14s;outline:none;letter-spacing:.04em}
.fmt-pill:hover{border-color:var(--bd-h);color:var(--tx-0);background:#FFFFFF}
.fmt-pill:focus-visible{box-shadow:0 0 0 2px var(--gl-cyan);border-color:var(--c-cyan)}
.fmt-pill.sel{border-color:var(--c-cyan);color:#FFFFFF;background:var(--c-cyan);box-shadow:var(--shadow-1)}
.fmt-bulk{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.fmt-bulk-btn{padding:5px 11px;font:600 10px/1 'Inter',sans-serif;text-transform:uppercase;background:var(--bg-2);border:1px solid var(--bd);border-radius:4px;cursor:pointer;color:var(--tx-2);transition:all .15s;outline:none;letter-spacing:.1em}
.fmt-bulk-btn:hover{border-color:var(--c-cyan);color:var(--c-cyan);background:#FFFFFF}
.modal-foot{padding:16px 24px;display:flex;gap:10px;border-top:1px solid var(--bd);background:var(--bg-1);justify-content:flex-end}
.btn{padding:10px 20px;border-radius:6px;font:600 13px/1 'Inter';cursor:pointer;border:1px solid transparent;transition:all .2s var(--ease);outline:none}
.btn:focus-visible{box-shadow:0 0 0 3px var(--gl-cyan)}
.btn-primary{background:var(--c-cyan);color:#FFFFFF;border-color:var(--c-cyan);box-shadow:var(--shadow-1)}
.btn-primary:hover{background:#92341E;border-color:#92341E;transform:translateY(-1px);box-shadow:var(--shadow-2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;border-color:var(--bd);color:var(--tx-1)}
.btn-ghost:hover{background:var(--bg-3);border-color:var(--bd-h);color:var(--tx-0)}

/* Stats Dashboard */
.stats-modal{width:880px;max-width:96%;max-height:88vh}
.stats-body{padding:24px;overflow-y:auto;flex:1;display:grid;grid-template-columns:1fr 1fr;gap:18px;background:var(--bg-0)}
.stats-card{background:var(--bg-2);border:1px solid var(--bd);border-radius:10px;padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow-1)}
.stats-card.full{grid-column:1/-1}
.stats-card-h{font:600 10px/1 'Inter',sans-serif;color:var(--tx-3);text-transform:uppercase;letter-spacing:.18em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stats-card-h::before{content:'';width:3px;height:11px;background:var(--c-cyan);border-radius:1.5px}
.stats-big{display:flex;align-items:baseline;gap:9px;margin-bottom:8px}
.stats-big-n{font:600 42px/1 'Fraunces',serif;color:var(--c-cyan);letter-spacing:-.04em;font-variation-settings:"opsz" 144}
.stats-big-l{font:500 12px/1 'Inter';color:var(--tx-3)}
.stats-bar{height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden;position:relative;margin:6px 0}
.stats-bar-fill{height:100%;border-radius:3px;transition:width .8s var(--ease)}
.stats-row{display:grid;grid-template-columns:96px 1fr 52px;gap:12px;align-items:center;padding:7px 0;font:500 11.5px/1.2 'Inter';color:var(--tx-1)}
.stats-row .stats-bar{margin:0;flex:1}
.stats-row strong{color:var(--tx-0);font-weight:600;text-align:right;font:600 11px/1 'JetBrains Mono',monospace}
.stats-row-name{display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-row-name .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Tooltip */
.tooltip{position:fixed;background:var(--tx-0);border:1px solid var(--tx-0);border-radius:5px;padding:7px 11px;font:500 11.5px/1.4 'Inter';color:var(--bg-0);box-shadow:var(--shadow-2);z-index:500;pointer-events:none;max-width:260px;animation:tt-in .15s var(--ease) both}
@keyframes tt-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-2);border:1px solid var(--bd);border-left:3px solid var(--c-green);border-radius:6px;padding:11px 18px;color:var(--tx-1);font:500 12.5px/1.4 'Inter';box-shadow:var(--shadow-3);animation:toast-in .3s var(--ease-bounce);min-width:240px;max-width:380px}
.toast.err{border-left-color:var(--c-red)}
.toast.warn{border-left-color:var(--c-amber)}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Drag overlay */
.drop-overlay{position:fixed;inset:0;background:rgba(176,67,42,.06);z-index:600;display:flex;align-items:center;justify-content:center;border:3px dashed var(--c-cyan);pointer-events:none;animation:fade-in .2s}
.drop-card{background:var(--bg-2);border:1.5px solid var(--c-cyan);border-radius:14px;padding:40px 52px;text-align:center;box-shadow:var(--shadow-3)}
.drop-card svg{width:48px;height:48px;stroke:var(--c-cyan);fill:none;stroke-width:1.5;margin-bottom:16px}
.drop-card h2{font:600 26px/1 'Fraunces',serif;color:var(--tx-0);margin-bottom:6px;letter-spacing:-.02em}
.drop-card p{font:400 13.5px/1.5 'Inter';color:var(--tx-2)}

/* Scrollbars */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd-h);border-radius:4px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--tx-3);background-clip:padding-box;border:2px solid transparent}

/* Selection */
::selection{background:color-mix(in srgb,var(--c-cyan) 28%,transparent);color:var(--tx-0)}

/* Responsive */
@media (max-width:1100px){.info.open{width:340px;min-width:340px}.side{width:200px;min-width:200px}}
@media (max-width:880px){.side{display:none}.search{max-width:none}.brand-tx{display:none}.info.open{width:300px;min-width:300px}}
</style>

// ============================================================
// MAIN APP
// ============================================================
const STORAGE_KEY='format-explorer-v2-state';
function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return null;
}
function saveState(s){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}catch(e){}
}

function App(){
  const saved=loadState();
  const [cat,setCat]=useState(saved?.cat||'imagen');
  const [ext,setExt]=useState(null);
  const [app,setApp]=useState(null);
  const [search,setSearch]=useState('');
  const [appSearch,setAppSearch]=useState('');
  const [apps,setApps]=useState(saved?.apps||APPS);
  const [showAdd,setShowAdd]=useState(false);
  const [editApp,setEditApp]=useState(null);
  const [showCmp,setShowCmp]=useState(null);
  const [showStats,setShowStats]=useState(false);
  const [showHelp,setShowHelp]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [dragActive,setDragActive]=useState(false);
  const searchRef=useRef(null);

  // Persist state
  useEffect(()=>{saveState({cat,apps})},[cat,apps]);

  const toast=useCallback((msg,kind='info')=>{
    const id=Math.random().toString(36).slice(2);
    setToasts(t=>[...t,{id,msg,kind}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);

  // All extensions across all categories
  const allExt=useMemo(()=>{
    const s=new Set();
    Object.values(CATS).forEach(c=>c.e.forEach(x=>s.add(x)));
    return [...s].sort();
  },[]);

  // Search across extensions, full names and apps
  const searchResult=useMemo(()=>{
    if(!search.trim())return null;
    const q=search.toUpperCase().trim();
    const exts=new Set();
    const cats=new Set();
    Object.entries(CATS).forEach(([k,c])=>c.e.forEach(x=>{
      if(x.includes(q)){exts.add(x);cats.add(k)}
      const info=D[x];
      if(info && info.f.toUpperCase().includes(q)){exts.add(x);cats.add(k)}
    }));
    return {exts:[...exts].sort(),cats:[...cats]};
  },[search]);

  // Current extensions
  const currentExt=useMemo(()=>{
    if(searchResult&&searchResult.exts.length>0)return searchResult.exts;
    return CATS[cat]?.e||[];
  },[cat,searchResult]);

  const activeApp=useMemo(()=>apps.find(a=>a.id===app),[app,apps]);
  const activeAppFmt=useMemo(()=>new Set(activeApp?activeApp.fm:[]),[activeApp]);

  const filteredApps=useMemo(()=>{
    if(!appSearch.trim())return apps;
    const q=appSearch.toLowerCase();
    return apps.filter(a=>a.nm.toLowerCase().includes(q)||(a.vd||'').toLowerCase().includes(q));
  },[apps,appSearch]);

  // Apps by coverage of current extension
  const compatibleApps=useMemo(()=>ext?apps.filter(a=>a.fm.includes(ext)):[],[ext,apps]);
  const altApps=useMemo(()=>ext?(ALT_APPS[ext]||[]):[],[ext]);

  // Recommended app for current extension: highest popularity weighted by coverage of current category
  const recommended=useMemo(()=>{
    if(!ext||compatibleApps.length===0)return null;
    const catExts=CATS[cat]?.e||[];
    const scored=compatibleApps.map(a=>{
      const inCat=a.fm.filter(f=>catExts.includes(f)).length;
      const cov=catExts.length>0?(inCat/catExts.length):0;
      const total=a.fm.length;
      const score=cov*0.6+Math.min(total/40,1)*0.4;
      return {...a,score,coverage:cov,inCat};
    }).sort((a,b)=>b.score-a.score);
    return scored[0];
  },[ext,compatibleApps,cat]);

  // Compute coverage per app within current category (for the strip badge)
  const appCoverage=useMemo(()=>{
    const catExts=CATS[cat]?.e||[];
    const m={};
    apps.forEach(a=>{
      const cov=catExts.filter(x=>a.fm.includes(x)).length;
      m[a.id]={count:cov,pct:catExts.length?Math.round(100*cov/catExts.length):0};
    });
    return m;
  },[cat,apps]);

  // Reset extension when category changes
  useEffect(()=>{setExt(null)},[cat]);

  // Keyboard shortcuts
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='/'){e.preventDefault();searchRef.current?.focus()}
      if(e.key==='Escape'){
        if(showAdd)setShowAdd(false);
        else if(editApp)setEditApp(null);
        else if(showCmp)setShowCmp(null);
        else if(showStats)setShowStats(false);
        else if(showHelp)setShowHelp(false);
        else if(ext)setExt(null);
        else if(app)setApp(null);
      }
      if(e.key==='?'){e.preventDefault();setShowHelp(true)}
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[ext,app,showAdd,editApp,showCmp,showStats,showHelp]);

  // Drag and drop file detection
  useEffect(()=>{
    let dragCounter=0;
    const onDragEnter=(e)=>{
      e.preventDefault();
      if(e.dataTransfer&&e.dataTransfer.types.includes('Files')){
        dragCounter++;
        setDragActive(true);
      }
    };
    const onDragLeave=(e)=>{
      e.preventDefault();
      dragCounter--;
      if(dragCounter<=0){dragCounter=0;setDragActive(false)}
    };
    const onDragOver=(e)=>e.preventDefault();
    const onDrop=(e)=>{
      e.preventDefault();
      dragCounter=0;
      setDragActive(false);
      const file=e.dataTransfer.files[0];
      if(!file)return;
      const parts=file.name.split('.');
      if(parts.length<2){toast('Sin extensión detectable','warn');return}
      const ex=parts.pop().toUpperCase();
      // Find category
      let foundCat=null;
      for(const [k,c] of Object.entries(CATS)){
        if(c.e.includes(ex)){foundCat=k;break}
      }
      if(foundCat){
        setCat(foundCat);
        setExt(ex);
        setSearch('');
        toast(`.${ex} detectado en ${CATS[foundCat].n}`,'info');
      }else{
        toast(`.${ex} no está en ningún catálogo`,'warn');
      }
    };
    window.addEventListener('dragenter',onDragEnter);
    window.addEventListener('dragleave',onDragLeave);
    window.addEventListener('dragover',onDragOver);
    window.addEventListener('drop',onDrop);
    return()=>{
      window.removeEventListener('dragenter',onDragEnter);
      window.removeEventListener('dragleave',onDragLeave);
      window.removeEventListener('dragover',onDragOver);
      window.removeEventListener('drop',onDrop);
    };
  },[toast]);

  const onAddApp=(a)=>{
    setApps(p=>[...p,a]);
    setShowAdd(false);
    toast(`Aplicación añadida: ${a.nm}`,'info');
  };

  const onEditApp=(a)=>{
    setApps(p=>p.map(x=>x.id===a.id?a:x));
    setEditApp(null);
    toast(`Actualizado: ${a.nm}`,'info');
  };

  const onRemoveApp=(id)=>{
    const a=apps.find(x=>x.id===id);
    setApps(p=>p.filter(x=>x.id!==id));
    if(app===id)setApp(null);
    toast(`Eliminado: ${a?.nm||'app'}`,'warn');
  };

  const totalFmt=allExt.length;
  const coveredFmt=useMemo(()=>{
    const s=new Set();
    apps.forEach(a=>a.fm.forEach(f=>s.add(f)));
    return s.size;
  },[apps]);

  return (<>
    <header className="hdr">
      <div className="brand">
        <div className="brand-mark">FX</div>
        <div className="brand-tx">
          <h1>Format Explorer</h1>
          <p>v2 · file compatibility tool</p>
        </div>
      </div>
      <div className="search">
        <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar formato o nombre… (.png, joint photographic, raw…)" aria-label="Buscar"/>
        <svg className="search-ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        {!search && <span className="search-kbd">/</span>}
      </div>
      <div className="hdr-actions">
        <button className="hdr-btn" onClick={()=>setShowStats(true)} title="Panel de estadísticas">
          <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="3" width="4" height="18"/></svg>
          <span>Stats</span>
        </button>
        <button className="hdr-btn" onClick={()=>setShowHelp(true)} title="Ayuda (?)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
        <button className="hdr-btn primary" onClick={()=>setShowAdd(true)}>
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Añadir app</span>
        </button>
      </div>
    </header>

    <div className="body">
      <aside className="side">
        <div className="side-h">
          <div className="side-h-tx">Categorías</div>
          <div className="side-h-ct">{Object.keys(CATS).length}</div>
        </div>
        <div className="side-list">
          {Object.entries(CATS).map(([k,c])=>(
            <div key={k} className={`cat${cat===k?' active':''}`} style={{'--cat-cl':c.cl}} onClick={()=>{setCat(k);setSearch('')}} role="button" tabIndex={0} onKeyDown={e=>e.key==='Enter'&&(setCat(k),setSearch(''))}>
              <div className="cat-ico">{c.i}</div>
              <span className="cat-name">{c.n}</span>
              <span className="cat-count">{c.e.length}</span>
              <button className="cat-info" onClick={e=>{e.stopPropagation();setShowCmp(k)}} title="Tabla comparativa">i</button>
            </div>
          ))}
        </div>
        <div className="side-foot">
          <div className="side-stat"><span>Total formatos</span><strong>{totalFmt}</strong></div>
          <div className="side-stat"><span>Tus apps cubren</span><strong>{coveredFmt}</strong></div>
        </div>
      </aside>

      <main className="center">
        <div className="cnt-h">
          <div>
            <div className="cnt-title">
              {searchResult?<>Resultados de búsqueda<small>{searchResult.exts.length} formato{searchResult.exts.length!==1?'s':''} para "{search}"</small></>:
              <>{CATS[cat].i} {CATS[cat].n}<small>{CATS[cat].e.length} formatos · click para ver detalles</small></>}
            </div>
          </div>
          <div className="cnt-h-actions">
            {activeApp&&<div className="chip" style={{borderColor:activeApp.cl,color:activeApp.cl}}>
              <span style={{width:7,height:7,borderRadius:99,background:activeApp.cl}}/>
              <span>{activeApp.nm}</span>
              <strong>{appCoverage[activeApp.id]?.count||0}/{CATS[cat].e.length}</strong>
            </div>}
            <button className="hdr-btn" onClick={()=>setShowCmp(cat)} title="Tabla comparativa de la categoría">
              <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              <span>Comparar</span>
            </button>
          </div>
        </div>

        <div className="cnt-body" style={{'--cat-cl':CATS[cat].cl,'--cat-grad':CATS[cat].cl}}>
          {currentExt.length===0?
            <div className="cnt-body-empty">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <h3>Sin resultados</h3>
              <p>No hay formatos que coincidan con "{search}". Prueba con otra búsqueda o despeja la barra.</p>
            </div>
          :
            <div className="grid">
              {currentExt.map((x,i)=>{
                const hl=app&&activeAppFmt.has(x);
                const sl=ext===x;
                const dim=app&&!activeAppFmt.has(x)&&!sl;
                const info=D[x];
                const pop=info?.pop||0;
                return (<div key={x} className={`ext${sl?' sel':''}${hl?' hl':''}${dim?' dim':''}`} style={{animationDelay:`${i*.012}s`,'--app-cl':hl?activeApp.cl:undefined}} onClick={()=>setExt(ext===x?null:x)} role="button" tabIndex={0} onKeyDown={e=>e.key==='Enter'&&setExt(ext===x?null:x)} title={info?info.f:x}>
                  <span>{x}</span>
                  {pop>=8&&<span className="ext-pop high"/>}
                </div>);
              })}
            </div>
          }
        </div>

        <div className="app-strip">
          <div className="app-strip-h">
            <div className="app-strip-h-l">Aplicaciones · {apps.length}</div>
            <div className="app-search">
              <input value={appSearch} onChange={e=>setAppSearch(e.target.value)} placeholder="Buscar app…" aria-label="Buscar app"/>
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <div className="app-strip-h-r">
              {app&&<button className="app-mini-btn ghost" onClick={()=>setApp(null)} title="Deseleccionar app">✕</button>}
              <button className="app-mini-btn" onClick={()=>setShowAdd(true)} title="Añadir app">+</button>
            </div>
          </div>
          <div className="app-list">
            {filteredApps.map(a=>{
              const cov=appCoverage[a.id];
              return (<div key={a.id} className={`app-card${app===a.id?' act':''}`} style={{'--app-cl':a.cl}} onClick={()=>setApp(app===a.id?null:a.id)} onContextMenu={e=>{e.preventDefault();setEditApp(a)}} role="button" tabIndex={0} title={`${a.nm} · ${a.vd||''} · ${a.fm.length} formatos · click derecho para editar`}>
                <span className="app-dot"/>
                <span className="app-name">{a.nm}</span>
                <span className="app-cov">{cov?.pct||0}%</span>
                <button className="app-card-rm" onClick={e=>{e.stopPropagation();onRemoveApp(a.id)}} title="Eliminar">×</button>
              </div>);
            })}
            {filteredApps.length===0&&<div style={{padding:'20px 16px',color:'var(--tx-3)',fontSize:12}}>Sin coincidencias</div>}
          </div>
        </div>
      </main>

      <aside className={`info${ext?' open':''}`}>
        {ext&&<InfoPanel ext={ext} cat={cat} compatibleApps={compatibleApps} altApps={altApps} recommended={recommended} onClose={()=>setExt(null)} onSelectApp={id=>setApp(id)} onSelectExt={x=>setExt(x)}/>}
      </aside>
    </div>

    {showAdd&&<AddAppModal allExt={allExt} onClose={()=>setShowAdd(false)} onAdd={onAddApp}/>}
    {editApp&&<AddAppModal allExt={allExt} initial={editApp} onClose={()=>setEditApp(null)} onAdd={onEditApp} title="Editar Aplicación"/>}
    {showCmp&&<CompareModal catKey={showCmp} onClose={()=>setShowCmp(null)} apps={apps}/>}
    {showStats&&<StatsModal apps={apps} onClose={()=>setShowStats(false)}/>}
    {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}

    {dragActive&&<div className="drop-overlay">
      <div className="drop-card">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <h2>Suelta el archivo</h2>
        <p>Detectaré la extensión y abriré sus detalles automáticamente</p>
      </div>
    </div>}

    <div className="toast-wrap">
      {toasts.map(t=><div key={t.id} className={`toast ${t.kind==='warn'?'warn':t.kind==='err'?'err':''}`}>{t.msg}</div>)}
    </div>
  </>);
}

// ============================================================
// INFO PANEL
// ============================================================
function InfoPanel({ext,cat,compatibleApps,altApps,recommended,onClose,onSelectApp,onSelectExt}){
  const info=D[ext];
  const ct=Object.entries(CATS).find(([_,c])=>c.e.includes(ext));
  const catCl=ct?ct[1].cl:'#B0432A';
  const grad=catCl;
  const tags=[];
  if(info){
    if(info.s)tags.push({t:info.s,k:info.s.includes('Legacy')?'dead':info.s.includes('Moderno')?'acc':'norm'});
    if(info.l==='Sí')tags.push({t:'Lossy',k:'warn'});
    if(info.l==='No')tags.push({t:'Lossless',k:'acc'});
    if(info.tr==='Sí')tags.push({t:'Transparente',k:'norm'});
    if(info.a==='Sí')tags.push({t:'Animado',k:'norm'});
  }
  return (<div style={{position:'relative',height:'100%','--cat-cl':catCl,'--cat-grad':grad}}>
    <button className="info-close" onClick={onClose} title="Cerrar">✕</button>
    <div className="info-inner">
      <div className="info-hero">
        <div className="info-ext">.{ext}</div>
        <div className="info-cat"><span className="info-cat-dot"/>{ct?`${ct[1].i} ${ct[1].n}`:'General'}{info?.y&&<>· {info.y}</>}</div>
        {info?<>
          <div className="info-name">{info.f}</div>
          <div className="info-desc">{info.d}</div>
          {tags.length>0&&<div className="info-tags">
            {tags.map((t,i)=><span key={i} className={`info-tag ${t.k==='acc'?'acc':t.k==='warn'?'warn':t.k==='dead'?'dead':''}`}>{t.t}</span>)}
          </div>}
          {info.pop&&<div className="info-pop">
            <span className="info-pop-l">Popularidad</span>
            <div className="info-pop-bar"><div className="info-pop-bar-fill" style={{width:`${info.pop*10}%`}}/></div>
            <span className="info-pop-v">{info.pop}/10</span>
          </div>}
        </>:<div style={{color:'var(--tx-3)',fontStyle:'italic',fontSize:13}}>Información detallada no disponible para .{ext}</div>}
      </div>

      {info&&<div className="info-meta">
        {info.t&&info.t!=='N/A'&&<div className="meta-row"><span className="meta-k">Tipo</span><span className="meta-v">{info.t}</span></div>}
        {info.l&&info.l!=='N/A'&&<div className="meta-row"><span className="meta-k">Pérdida</span><span className="meta-v">{info.l}</span></div>}
        {info.tr&&info.tr!=='N/A'&&<div className="meta-row"><span className="meta-k">Transparencia</span><span className="meta-v">{info.tr}</span></div>}
        {info.a&&info.a!=='N/A'&&<div className="meta-row"><span className="meta-k">Animación</span><span className="meta-v">{info.a}</span></div>}
        {info.c&&info.c!=='N/A'&&<div className="meta-row"><span className="meta-k">Color</span><span className="meta-v">{info.c}</span></div>}
        {info.co&&info.co!=='N/A'&&<div className="meta-row"><span className="meta-k">Compresión</span><span className="meta-v">{info.co}</span></div>}
        {info.mime&&<div className="meta-row"><span className="meta-k">MIME</span><span className="meta-v mono-sm">{info.mime}</span></div>}
        {info.magic&&<div className="meta-row"><span className="meta-k">Magic bytes</span><span className="meta-v mono-sm">{info.magic}</span></div>}
      </div>}

      {recommended&&<div className="info-rec" style={{'--app-cl':recommended.cl}} onClick={()=>onSelectApp(recommended.id)}>
        <div className="info-rec-l">★ App recomendada</div>
        <div className="info-rec-name"><span className="ad"/>{recommended.nm}</div>
        <div className="info-rec-reason">Cubre {recommended.inCat}/{(CATS[cat]?.e||[]).length} formatos de esta categoría · {recommended.fm.length} formatos en total</div>
      </div>}

      {compatibleApps.length>0&&<div className="info-section">
        <div className="info-section-h">✓ En tu lista · {compatibleApps.length}</div>
        <div className="app-comp-list">
          {compatibleApps.map(a=><div key={a.id} className="app-comp-item" style={{'--app-cl':a.cl}} onClick={()=>onSelectApp(a.id)} role="button" tabIndex={0}>
            <span className="ad"/>
            <span className="app-comp-name">{a.nm}</span>
            <span className="app-comp-tag">I/O</span>
          </div>)}
        </div>
      </div>}

      {compatibleApps.length===0&&<div className="info-section">
        <div style={{padding:'10px 12px',background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)',borderRadius:9,fontSize:12,lineHeight:1.5,color:'var(--tx-2)'}}>
          Ninguna de tus apps soporta <strong style={{color:'var(--c-red)'}}>.{ext}</strong>. Mira las recomendaciones de abajo o añade una nueva app.
        </div>
      </div>}

      {altApps.length>0&&<div className="info-section">
        <div className="info-section-h">★ También funciona con</div>
        <div className="alt-list">
          {altApps.map(n=><div key={n} className="alt-item">{n}</div>)}
        </div>
      </div>}

      {info?.rel&&info.rel.length>0&&<div className="info-section">
        <div className="info-section-h">⇄ Formatos relacionados</div>
        <div className="related-list">
          {info.rel.map(x=><span key={x} className="related-pill" onClick={()=>onSelectExt(x)} role="button" tabIndex={0}>.{x}</span>)}
        </div>
      </div>}

      {info?.alts&&info.alts.length>0&&<div className="info-section">
        <div className="info-section-h">→ Alternativas modernas</div>
        <div className="alt-list">
          {info.alts.map(a=><div key={a} className="alt-item">{a}</div>)}
        </div>
      </div>}
    </div>
  </div>);
}

// ============================================================
// COMPARE MODAL
// ============================================================
function CompareModal({catKey,onClose,apps}){
  const c=CATS[catKey];
  const [filter,setFilter]=useState('');
  if(!c)return null;

  const isImg=catKey==='imagen';
  const isAud=catKey==='audio';
  const isVid=catKey==='video';
  const is3D=catKey==='cad';
  const isDoc=['documento','hoja','presentacion','ebook'].includes(catKey);

  const filtered=useMemo(()=>{
    if(!filter.trim())return c.e;
    const q=filter.toUpperCase();
    return c.e.filter(x=>{
      if(x.includes(q))return true;
      const inf=D[x];
      return inf&&inf.f.toUpperCase().includes(q);
    });
  },[filter,c.e]);

  // Group by sub-status
  const groups={};
  filtered.forEach(x=>{
    const inf=D[x];
    const sg=inf?.s||'Otros';
    if(!groups[sg])groups[sg]=[];
    groups[sg].push({x,info:inf});
  });

  const cellClass=(v)=>{
    if(!v||v==='—')return 'tbl-cell-mut';
    if(v==='Sí')return 'tbl-cell-y';
    if(v==='No')return 'tbl-cell-n';
    return '';
  };

  const colSpan=isImg?9:isAud?7:isVid?7:is3D?8:isDoc?7:7;

  return (<div className="overlay" onClick={onClose}>
    <div className="modal cmp-modal" onClick={e=>e.stopPropagation()} style={{'--cat-cl':c.cl}}>
      <div className="modal-h">
        <div className="modal-t">
          <span style={{fontSize:18}}>{c.i}</span>
          <span>Comparativa — {c.n}</span>
          <small>{c.e.length} formatos · {Object.keys(groups).length} subgrupos</small>
        </div>
        <button className="modal-c" onClick={onClose}>✕</button>
      </div>
      <div className="cmp-toolbar">
        <div className="cmp-search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filtrar formato o nombre…"/>
        </div>
        <div className="cmp-stat">Mostrando <strong>{filtered.length}</strong> / {c.e.length}</div>
      </div>
      <div className="modal-b">
        <table className="tbl">
          <thead><tr>
            <th>Ext.</th><th>Nombre completo</th><th>Tipo</th>
            {isImg&&<><th>Pérdida</th><th>Transp.</th><th>Anim.</th><th>Color</th></>}
            {isAud&&<><th>Pérdida</th><th>Codec</th></>}
            {isVid&&<><th>Pérdida</th><th>Codec</th></>}
            {is3D&&<><th>Anim.</th><th>Color</th><th>BREP</th></>}
            {isDoc&&<><th>Compresión</th></>}
            <th>Año</th><th>Pop.</th>
          </tr></thead>
          <tbody>
            {Object.entries(groups).map(([sg,items])=><React.Fragment key={sg}>
              <tr className="subhead"><td colSpan={colSpan}>{sg} · {items.length}</td></tr>
              {items.map(({x,info})=><tr key={x}>
                <td>.{x}</td>
                <td>{info?.f||'—'}</td>
                <td>{info?.t||'—'}</td>
                {isImg&&<>
                  <td className={cellClass(info?.l)}>{info?.l||'—'}</td>
                  <td className={cellClass(info?.tr)}>{info?.tr||'—'}</td>
                  <td className={cellClass(info?.a)}>{info?.a||'—'}</td>
                  <td>{info?.c||'—'}</td>
                </>}
                {isAud&&<>
                  <td className={cellClass(info?.l)}>{info?.l||'—'}</td>
                  <td>{info?.co||'—'}</td>
                </>}
                {isVid&&<>
                  <td className={cellClass(info?.l)}>{info?.l||'—'}</td>
                  <td>{info?.co||'—'}</td>
                </>}
                {is3D&&<>
                  <td className={cellClass(info?.a)}>{info?.a||'—'}</td>
                  <td>{info?.c||'—'}</td>
                  <td>{info?.t?.includes('BREP')?'Sí':info?.t?.includes('Malla')?'No':'—'}</td>
                </>}
                {isDoc&&<td>{info?.co||'—'}</td>}
                <td>{info?.y||'—'}</td>
                <td><small style={{color:info?.pop>=8?'var(--c-amber)':info?.pop>=5?'var(--c-cyan)':'var(--tx-3)'}}>{info?.pop?'★'.repeat(Math.ceil(info.pop/2)):'—'}</small></td>
              </tr>)}
            </React.Fragment>)}
          </tbody>
        </table>
      </div>
    </div>
  </div>);
}

// ============================================================
// ADD/EDIT APP MODAL
// ============================================================
function AddAppModal({allExt,onClose,onAdd,initial,title='Añadir Aplicación'}){
  const [nm,setNm]=useState(initial?.nm||'');
  const [vd,setVd]=useState(initial?.vd||'');
  const [cl,setCl]=useState(initial?.cl||APP_COLORS[0]);
  const [sf,setSf]=useState(new Set(initial?.fm||[]));
  const [fs,setFs]=useState('');

  const filtered=useMemo(()=>{
    if(!fs.trim())return allExt;
    const q=fs.toUpperCase();
    return allExt.filter(e=>e.includes(q));
  },[fs,allExt]);

  const toggle=(x)=>{
    const n=new Set(sf);
    n.has(x)?n.delete(x):n.add(x);
    setSf(n);
  };

  const bulkAdd=(catKey)=>{
    const n=new Set(sf);
    CATS[catKey].e.forEach(x=>n.add(x));
    setSf(n);
  };

  const submit=()=>{
    if(!nm.trim())return;
    const data={
      id:initial?.id||(nm.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now()),
      nm:nm.trim(),
      vd:vd.trim()||undefined,
      cl,
      fm:[...sf]
    };
    onAdd(data);
  };

  return (<div className="overlay" onClick={onClose}>
    <div className="modal add-modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-h">
        <div className="modal-t">{title}<small>· {sf.size} formato{sf.size!==1?'s':''}</small></div>
        <button className="modal-c" onClick={onClose}>✕</button>
      </div>
      <div className="add-body">
        <div className="field">
          <label className="field-l">Nombre</label>
          <input className="field-input" type="text" value={nm} onChange={e=>setNm(e.target.value)} placeholder="Ej: Krita, Ableton Live…" autoFocus/>
        </div>
        <div className="field">
          <label className="field-l">Vendor / Empresa (opcional)</label>
          <input className="field-input" type="text" value={vd} onChange={e=>setVd(e.target.value)} placeholder="Ej: Adobe, Apple…"/>
        </div>
        <div className="field">
          <label className="field-l">Color identificativo</label>
          <div className="swatches">
            {APP_COLORS.map(c=><div key={c} className={`swatch${cl===c?' sl':''}`} style={{background:c,color:c}} onClick={()=>setCl(c)} role="button" tabIndex={0}/>)}
          </div>
        </div>
        <div className="field">
          <label className="field-l">Formatos soportados ({sf.size})</label>
          <div className="fmt-bulk">
            {Object.entries(CATS).slice(0,10).map(([k,c])=>
              <button key={k} className="fmt-bulk-btn" onClick={()=>bulkAdd(k)} type="button">+ {c.n}</button>
            )}
            {sf.size>0&&<button className="fmt-bulk-btn" onClick={()=>setSf(new Set())} type="button" style={{color:'var(--c-red)',borderColor:'rgba(248,113,113,.3)'}}>Limpiar</button>}
          </div>
          <input className="field-input" type="text" value={fs} onChange={e=>setFs(e.target.value)} placeholder="Filtrar formatos…" style={{marginBottom:8}}/>
          <div className="fmt-grid">
            {filtered.map(e=><div key={e} className={`fmt-pill${sf.has(e)?' sel':''}`} onClick={()=>toggle(e)} role="button" tabIndex={0}>{e}</div>)}
          </div>
        </div>
      </div>
      <div className="modal-foot">
        <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={submit} disabled={!nm.trim()}>{initial?'Guardar':'Añadir'}</button>
      </div>
    </div>
  </div>);
}

// ============================================================
// STATS MODAL
// ============================================================
function StatsModal({apps,onClose}){
  const totalFmt=useMemo(()=>{
    const s=new Set();
    Object.values(CATS).forEach(c=>c.e.forEach(x=>s.add(x)));
    return s.size;
  },[]);
  const allYour=useMemo(()=>{
    const s=new Set();
    apps.forEach(a=>a.fm.forEach(f=>s.add(f)));
    return s;
  },[apps]);
  const coveragePct=Math.round(100*allYour.size/totalFmt);

  // Coverage per category
  const catCov=useMemo(()=>Object.entries(CATS).map(([k,c])=>{
    const cov=c.e.filter(x=>allYour.has(x)).length;
    return {k,n:c.n,cl:c.cl,total:c.e.length,cov,pct:Math.round(100*cov/c.e.length)};
  }),[allYour]);

  // Apps ranked by total fmt
  const appsRanked=useMemo(()=>[...apps].sort((a,b)=>b.fm.length-a.fm.length),[apps]);

  // Format gaps - formats no app supports
  const gaps=useMemo(()=>{
    const out=[];
    Object.entries(CATS).forEach(([k,c])=>{
      c.e.forEach(x=>{if(!allYour.has(x))out.push({x,c:c.n,cl:c.cl})});
    });
    return out.slice(0,40);
  },[allYour]);

  return (<div className="overlay" onClick={onClose}>
    <div className="modal stats-modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-h">
        <div className="modal-t">📊 Panel de estadísticas<small>· tu cobertura de formatos</small></div>
        <button className="modal-c" onClick={onClose}>✕</button>
      </div>
      <div className="modal-b stats-body">
        <div className="stats-card">
          <div className="stats-card-h">Cobertura global</div>
          <div className="stats-big"><span className="stats-big-n">{allYour.size}</span><span className="stats-big-l">/ {totalFmt} formatos</span></div>
          <div className="stats-bar"><div className="stats-bar-fill" style={{width:`${coveragePct}%`,background:'var(--grad-acc)'}}/></div>
          <div style={{fontSize:11,color:'var(--tx-3)',marginTop:4}}>{coveragePct}% del catálogo</div>
        </div>
        <div className="stats-card">
          <div className="stats-card-h">Apps registradas</div>
          <div className="stats-big"><span className="stats-big-n" style={{color:'var(--c-purple)'}}>{apps.length}</span><span className="stats-big-l">aplicaciones</span></div>
          <div style={{fontSize:11,color:'var(--tx-3)',marginTop:4}}>Promedio: {Math.round(apps.reduce((s,a)=>s+a.fm.length,0)/Math.max(apps.length,1))} formatos por app</div>
        </div>

        <div className="stats-card full">
          <div className="stats-card-h">Cobertura por categoría</div>
          {catCov.map(c=><div key={c.k} className="stats-row">
            <div className="stats-row-name"><span className="dot" style={{background:c.cl}}/>{c.n}</div>
            <div className="stats-bar"><div className="stats-bar-fill" style={{width:`${c.pct}%`,background:c.cl}}/></div>
            <strong>{c.cov}/{c.total}</strong>
          </div>)}
        </div>

        <div className="stats-card full">
          <div className="stats-card-h">Top apps por nº formatos</div>
          {appsRanked.slice(0,12).map(a=><div key={a.id} className="stats-row">
            <div className="stats-row-name"><span className="dot" style={{background:a.cl}}/>{a.nm}</div>
            <div className="stats-bar"><div className="stats-bar-fill" style={{width:`${Math.min(100,(a.fm.length/Math.max(...appsRanked.map(x=>x.fm.length)))*100)}%`,background:a.cl}}/></div>
            <strong>{a.fm.length}</strong>
          </div>)}
        </div>

        {gaps.length>0&&<div className="stats-card full">
          <div className="stats-card-h">⚠ Formatos sin cobertura ({gaps.length}{gaps.length>=40?'+':''})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {gaps.map(g=><span key={g.x} style={{padding:'4px 9px',background:'var(--bg-3)',border:`1px solid ${g.cl}55`,borderRadius:5,font:'600 10px/1 JetBrains Mono,monospace',color:g.cl}}>.{g.x}</span>)}
          </div>
        </div>}
      </div>
    </div>
  </div>);
}
