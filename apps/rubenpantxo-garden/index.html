<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rubenpantxo Garden Manager - Gestor profesional de huerto y cultivo" />
  <title>Rubenpantxo · Garden Manager</title>
  <link rel="icon" type="image/png" href="assets/icons/logo.png" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/palettes.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/sections.css" />
</head>
<body>
  <!-- Bloqueo móvil -->
  <div id="mobile-block">
    <div class="mobile-block-inner">
      <img src="assets/icons/logo.png" alt="Logo" />
      <h2>Optimizado para escritorio</h2>
      <p>Esta aplicación requiere una pantalla de al menos <strong>1024px</strong> de ancho para ofrecer la mejor experiencia.</p>
      <p class="mobile-block-hint">Abre <em>rubenpantxo.com</em> desde tu ordenador o tablet en horizontal.</p>
    </div>
  </div>

  <!-- BARRA SUPERIOR FIJA -->
  <header id="top-bar">
    <div class="top-bar-left">
      <img src="assets/icons/logo.png" alt="Logo" class="brand-logo" />
      <div class="brand-text">
        <span class="brand-name">Rubenpantxo</span>
        <span class="brand-sub">Garden Manager</span>
      </div>
    </div>
    <div class="top-bar-center" id="phase-status">
      <div class="phase-pill">
        <span class="phase-dot"></span>
        <span class="phase-label">Ciclo:</span>
        <span class="phase-value" id="current-phase">Crecimiento</span>
      </div>
      <div class="location-pill" id="location-pill">
        <img src="assets/icons/invernadero.png" alt="" />
        <span>Invernadero</span>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="alert-bell" id="alert-bell" title="Alertas activas">
        <img src="assets/icons/alertas.png" alt="Alertas" />
        <span class="alert-count" id="alert-count">0</span>
      </button>
      <div class="date-pill" id="current-date"></div>
      <div class="actions-menu">
        <button id="btn-export" title="Exportar datos">⬇</button>
        <button id="btn-import" title="Importar datos">⬆</button>
        <input type="file" id="import-file" accept=".json" hidden />
      </div>
    </div>
  </header>

  <!-- VISTA HUB ISOMÉTRICA -->
  <main id="hub-view" class="view active">
    <div class="hub-stage">
      <img src="assets/img/parcela-isometrica.png" alt="Parcela" class="hub-bg" />
      <!-- Hotspots clickables sobre la parcela -->
      <button class="hotspot" data-route="plantas-invernadero" style="top: 32%; left: 52%;" title="Invernadero">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/invernadero.png" alt="" />
        <span class="hotspot-label">Invernadero</span>
      </button>
      <button class="hotspot" data-route="plantas-exterior" style="top: 60%; left: 45%;" title="Exterior">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/exterior.png" alt="" />
        <span class="hotspot-label">Exterior</span>
      </button>
      <button class="hotspot" data-route="riego" style="top: 65%; left: 38%;" title="Riego">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/bidon.png" alt="" />
        <span class="hotspot-label">Riego</span>
      </button>
      <button class="hotspot" data-route="stock" style="top: 73%; left: 12%;" title="Stock">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/stock.png" alt="" />
        <span class="hotspot-label">Stock</span>
      </button>
      <button class="hotspot" data-route="semillas" style="top: 33%; left: 28%;" title="Semillero">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/semillas-germinando.png" alt="" />
        <span class="hotspot-label">Semillero</span>
      </button>
      <button class="hotspot" data-route="calendarios" style="top: 18%; left: 78%;" title="Calendarios">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/calendario-general.png" alt="" />
        <span class="hotspot-label">Calendarios</span>
      </button>
      <button class="hotspot" data-route="infografias" style="top: 78%; left: 82%;" title="Infografías">
        <span class="hotspot-glow"></span>
        <img src="assets/icons/info-plus.png" alt="" />
        <span class="hotspot-label">Infografías</span>
      </button>
      <button class="hotspot" data-route="alertas" style="top: 12%; left: 12%;" title="Alertas">
        <span class="hotspot-glow alert"></span>
        <img src="assets/icons/alerta-meteorologia.png" alt="" />
        <span class="hotspot-label">Alertas</span>
      </button>
    </div>

    <!-- Mini-nav inferior -->
    <nav class="mini-nav">
      <button data-route="plantas" class="mini-nav-btn">
        <img src="assets/icons/planta-x.png" alt="" /><span>Plantas</span>
      </button>
      <button data-route="riego" class="mini-nav-btn">
        <img src="assets/icons/icono-riego.png" alt="" /><span>Riego</span>
      </button>
      <button data-route="stock" class="mini-nav-btn">
        <img src="assets/icons/stock.png" alt="" /><span>Stock</span>
      </button>
      <button data-route="calendarios" class="mini-nav-btn">
        <img src="assets/icons/calendario-general.png" alt="" /><span>Calendario</span>
      </button>
      <button data-route="infografias" class="mini-nav-btn">
        <img src="assets/icons/info-plus.png" alt="" /><span>Info</span>
      </button>
      <button data-route="alertas" class="mini-nav-btn">
        <img src="assets/icons/alertas.png" alt="" /><span>Alertas</span>
      </button>
    </nav>
  </main>

  <!-- VISTAS DE SECCIÓN (renderizadas dinámicamente) -->
  <div id="section-container"></div>

  <!-- MODAL GENÉRICO -->
  <div id="modal-root" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" hidden></div>

  <!-- SCRIPTS -->
  <script src="js/storage.js"></script>
  <script src="js/plants.js"></script>
  <script src="js/watering.js"></script>
  <script src="js/stock.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/infographics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
