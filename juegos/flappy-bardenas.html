<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bardenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace}
  body{display:flex;align-items:center;justify-content:center;touch-action:none}
  #stage{position:relative;width:100%;height:100%;max-width:480px;max-height:854px;background:#000;box-shadow:0 0 60px rgba(255,200,100,.15),0 0 0 2px #222;overflow:hidden}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer}
  /* CRT scanline overlay */
  #stage::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 2px,transparent 2px 4px);
    mix-blend-mode:multiply;z-index:10
  }
  #stage::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:11;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%)
  }
  .hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;color:#fff;font-size:8px;
        opacity:.5;z-index:12;letter-spacing:1px;text-shadow:1px 1px 0 #000}
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div class="hint">TAP · SPACE · ↑</div>
  </div>

<script>
(()=>{
  // ─── SETUP ────────────────────────────────────────────────────────────
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  // Resolución lógica baja para sabor pixel
  const W = 360, H = 640;
  canvas.width = W; canvas.height = H;
  ctx.imageSmoothingEnabled = false;

  // Estados
  const STATE = {READY:0, PLAY:1, DEAD:2};
  let state = STATE.READY;

  // ─── AUDIO (Web Audio API, sin assets) ────────────────────────────────
  let actx;
  const initAudio = () => { if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); };
  const beep = (freq=440, dur=0.08, type='square', vol=0.15) => {
    if(!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t + dur);
  };
  const sfx = {
    flap:  () => { beep(620,.05,'square',.12); setTimeout(()=>beep(820,.04,'square',.10),20); },
    score: () => { beep(880,.06,'square',.18); setTimeout(()=>beep(1320,.08,'square',.18),60); },
    hit:   () => {
      beep(180,.12,'sawtooth',.25);
      setTimeout(()=>beep(90,.18,'sawtooth',.20),80);
    },
    die:   () => { beep(440,.1,'square',.15); setTimeout(()=>beep(220,.2,'sawtooth',.18),120); }
  };

  // ─── PARÁMETROS DEL JUEGO ─────────────────────────────────────────────
  const G = 0.28;          // gravedad (más suave: el chorizo flota)
  const FLAP = -6.0;       // impulso al aletear (ajustado para que el techo del salto siga siendo razonable)
  const PIPE_W = 56;
  const PIPE_GAP = 150;
  const PIPE_SPEED = 2.2;
  const PIPE_INTERVAL = 125; // frames entre tubos (más separados → más respiro)
  const GROUND_H = 80;
  const GROUND_Y = H - GROUND_H;

  // Bird
  const bird = {
    x: 90, y: H/2, vy: 0, r: 12, rot: 0,
    flapPhase: 0, alive: true
  };
  let pipes = [];
  let particles = [];
  let clouds = [];
  let stars = [];
  let groundOffset = 0;
  let frame = 0;
  let score = 0;
  let best = 0;
  let pipeTimer = 0;
  let shake = 0;
  let dayPhase = 0; // 0=día, hasta 1=noche, ciclo

  // Inicializar nubes y estrellas
  for(let i=0;i<6;i++) clouds.push({x:Math.random()*W, y:30+Math.random()*180, s:0.3+Math.random()*0.5, w:30+Math.random()*40});
  for(let i=0;i<40;i++) stars.push({x:Math.random()*W, y:Math.random()*GROUND_Y*0.7, tw:Math.random()*Math.PI*2});

  // ─── DIBUJADO PIXEL-ART ───────────────────────────────────────────────
  // Paleta (estepa Bardenas: ocres, arcilla, brasa)
  const palette = {
    // Cielo Bardenas (día limpio cálido ↔ atardecer rojizo)
    skyDay1:'#a8d4ec', skyDay2:'#f9d8a6',
    skyNight1:'#d44a2a', skyNight2:'#ffb066',  // atardecer en lugar de noche
    // Cabezos / cárcavas
    mountainDay:'#c98e54', mountainDayDark:'#8b5a2e',
    mountainNight:'#7a3a18', mountainNightDark:'#4a210c',
    // Suelo arcilloso
    ground:'#d4a86a', groundDark:'#8b5a2e', groundLight:'#e8c896',
    clayCrack:'#3e2010',
    // Vegetación seca de matorral
    bush:'#6e7a3a', bushDark:'#4a5220',
    // Choricillos (los antiguos tubos) — mantenemos paleta del chorizo
    chorizoBase:'#a8281a', chorizoShade:'#6e1108', chorizoLight:'#d4452a',
    chorizoSpeck:'#3a0a04', chorizoFat:'#f5cfa0', chorizoString:'#e8d8b0',
    // Parrilla (el personaje)
    grillBar:'#3a3a3a', grillBarLight:'#7a7a7a', grillBarHigh:'#cdcdcd',
    grillFrame:'#1a1a1a', grillFrameLight:'#5a5a5a',
    ember:'#ff5520', emberHot:'#ffaa44', emberCore:'#ffe066',
    coal:'#2a1a14',
    chorizoEye:'#1a1a1a'
  };

  // Mezcla de color (lerp hex)
  const hex2rgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const rgb2hex = (r,g,b)=>'#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
  const lerp = (a,b,t)=>a+(b-a)*t;
  const lerpColor = (c1,c2,t)=>{ const a=hex2rgb(c1),b=hex2rgb(c2); return rgb2hex(lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)); };

  function drawSky(){
    // dayPhase: 0 mediodía ↔ 1 atardecer encendido (estepa Bardenas)
    const t = (Math.sin(dayPhase*Math.PI*2 - Math.PI/2)+1)/2;
    const top = lerpColor(palette.skyDay1, palette.skyNight1, t);
    const bot = lerpColor(palette.skyDay2, palette.skyNight2, t);
    const grd = ctx.createLinearGradient(0,0,0,GROUND_Y);
    grd.addColorStop(0, top);
    grd.addColorStop(1, bot);
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,GROUND_Y);

    // Sol bajo, grande, dorado — protagonista del cielo Bardenas
    const cycleX = ((dayPhase*W*2) % (W*2));
    const orbX = cycleX < W ? cycleX : (W*2 - cycleX);
    const orbY = 110 - Math.sin(Math.PI * (orbX/W)) * 60;
    // Halo
    ctx.fillStyle = `rgba(255,210,140,${0.18 + t*0.25})`;
    drawCircle(orbX, orbY, 32);
    // Disco solar
    ctx.fillStyle = t > 0.4 ? '#ff9450' : '#ffd968';
    drawCircle(orbX, orbY, 20);
    ctx.fillStyle = t > 0.4 ? '#ffbc6c' : '#fff0a8';
    drawCircle(orbX-3, orbY-3, 14);
  }

  function drawCircle(cx,cy,r){
    // círculo "pixelado"
    for(let y=-r;y<=r;y++){
      const w = Math.floor(Math.sqrt(r*r - y*y));
      ctx.fillRect(Math.floor(cx-w), Math.floor(cy+y), w*2, 1);
    }
  }

  function drawClouds(){
    const t = (Math.sin(dayPhase*Math.PI*2 - Math.PI/2)+1)/2;
    const cloudCol = t > 0.5 ? `rgba(180,180,210,${1-t*0.4})` : 'rgba(255,255,255,0.85)';
    for(const c of clouds){
      ctx.fillStyle = cloudCol;
      ctx.fillRect(c.x, c.y, c.w, 8);
      ctx.fillRect(c.x+6, c.y-5, c.w-12, 8);
      ctx.fillRect(c.x+12, c.y-9, c.w-24, 6);
      if(state===STATE.PLAY) c.x -= c.s;
      if(c.x + c.w < 0){ c.x = W+10; c.y = 30+Math.random()*180; }
    }
  }

  function drawMountains(){
    const t = (Math.sin(dayPhase*Math.PI*2 - Math.PI/2)+1)/2;
    const m1 = lerpColor(palette.mountainDayDark, palette.mountainNightDark, t);
    const m2 = lerpColor(palette.mountainDay, palette.mountainNight, t);
    const m3 = lerpColor('#d8a872', '#9a4828', t); // capa más cercana cálida

    // Capa lejana — cabezos redondeados con cárcavas
    ctx.fillStyle = m1;
    const off1 = (frame*0.12)%140;
    for(let x=-off1;x<W+140;x+=140){
      // mesa erosionada
      ctx.fillRect(x, GROUND_Y-40, 90, 40);
      ctx.fillRect(x+10, GROUND_Y-50, 70, 10);
      ctx.fillRect(x+22, GROUND_Y-58, 46, 8);
      // cárcavas verticales (líneas oscuras)
      ctx.fillStyle = lerpColor('#7a5230','#3a1a08',t);
      ctx.fillRect(x+18, GROUND_Y-40, 2, 38);
      ctx.fillRect(x+34, GROUND_Y-48, 2, 46);
      ctx.fillRect(x+52, GROUND_Y-46, 2, 44);
      ctx.fillRect(x+72, GROUND_Y-40, 2, 38);
      ctx.fillStyle = m1;
    }

    // Capa media — Castildetierra recurrente (cono con aguja)
    ctx.fillStyle = m2;
    const off2 = (frame*0.28)%200;
    for(let x=-off2;x<W+200;x+=200){
      // base ancha (cono trunco)
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x+30, GROUND_Y-50);
      ctx.lineTo(x+50, GROUND_Y-50);
      ctx.lineTo(x+80, GROUND_Y);
      ctx.closePath(); ctx.fill();
      // aguja característica
      ctx.fillRect(x+34, GROUND_Y-90, 12, 40);
      ctx.fillRect(x+36, GROUND_Y-100, 8, 10);
      // sombrero erosivo (más oscuro)
      ctx.fillStyle = lerpColor('#8b5828','#3a1a08',t);
      ctx.fillRect(x+32, GROUND_Y-95, 16, 5);
      ctx.fillStyle = m2;
      // cárcavas
      ctx.fillStyle = lerpColor('#7a4818','#321608',t);
      ctx.fillRect(x+38, GROUND_Y-85, 1, 35);
      ctx.fillRect(x+42, GROUND_Y-85, 1, 35);
      ctx.fillRect(x+18, GROUND_Y-30, 2, 30);
      ctx.fillRect(x+58, GROUND_Y-30, 2, 30);
      ctx.fillStyle = m2;
    }

    // Capa cercana — colinas bajas con grietas
    ctx.fillStyle = m3;
    const off3 = (frame*0.5)%100;
    for(let x=-off3;x<W+100;x+=100){
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x+25, GROUND_Y-25);
      ctx.lineTo(x+55, GROUND_Y-30);
      ctx.lineTo(x+80, GROUND_Y-22);
      ctx.lineTo(x+100, GROUND_Y);
      ctx.closePath(); ctx.fill();
      // grieta
      ctx.fillStyle = lerpColor('#8b4818','#3a1808',t);
      ctx.fillRect(x+40, GROUND_Y-25, 1, 23);
      ctx.fillRect(x+68, GROUND_Y-22, 1, 22);
      ctx.fillStyle = m3;
    }
  }

  function drawGround(){
    // Borde superior arcilloso (sin hierba — esto es estepa árida)
    ctx.fillStyle = palette.groundLight;
    ctx.fillRect(0, GROUND_Y, W, 4);
    ctx.fillStyle = palette.ground;
    ctx.fillRect(0, GROUND_Y+4, W, 8);
    // Cuerpo de arcilla
    ctx.fillStyle = palette.groundDark;
    ctx.fillRect(0, GROUND_Y+12, W, GROUND_H-12);

    // Patrón de grietas tipo "arcilla seca" — polígonos irregulares
    ctx.fillStyle = palette.clayCrack;
    const off = groundOffset%48;
    for(let x=-off; x<W+48; x+=48){
      // grieta horizontal larga
      ctx.fillRect(x, GROUND_Y+22, 30, 1);
      ctx.fillRect(x+18, GROUND_Y+38, 24, 1);
      ctx.fillRect(x+6, GROUND_Y+56, 28, 1);
      // grietas verticales conectoras
      ctx.fillRect(x+8, GROUND_Y+22, 1, 16);
      ctx.fillRect(x+24, GROUND_Y+22, 1, 16);
      ctx.fillRect(x+18, GROUND_Y+38, 1, 18);
      ctx.fillRect(x+34, GROUND_Y+38, 1, 18);
    }

    // Manchas claras (zonas resecadas/blanqueadas)
    ctx.fillStyle = palette.ground;
    const off2 = groundOffset%72;
    for(let x=-off2; x<W+72; x+=72){
      ctx.fillRect(x+10, GROUND_Y+18, 14, 3);
      ctx.fillRect(x+40, GROUND_Y+44, 18, 3);
      ctx.fillRect(x+52, GROUND_Y+62, 12, 2);
    }

    // Matorral seco ocasional (matas pequeñas en la línea del horizonte)
    ctx.fillStyle = palette.bushDark;
    const off3 = groundOffset%180;
    for(let x=-off3; x<W+180; x+=180){
      ctx.fillRect(x+30, GROUND_Y-3, 6, 3);
      ctx.fillRect(x+32, GROUND_Y-5, 2, 2);
      ctx.fillRect(x+120, GROUND_Y-2, 4, 2);
    }
  }

  function drawPipe(p){
    // Una ristra: cuerda vertical central + chorizos horizontales apilados, nudos entre cada par.
    // Los "tubos" superior e inferior son ristras independientes; entre ellas queda el hueco (gap).
    const cx = p.x + PIPE_W/2;
    const sausageH = 14;       // alto de cada chorizo individual
    const knotH = 4;           // separación entre chorizos (donde se ve la cuerda)
    const stride = sausageH + knotH;
    const sw = PIPE_W - 8;     // ancho del chorizo individual

    const drawSausage = (x, y) => {
      // Sombra de cuerpo
      ctx.fillStyle = palette.chorizoShade;
      ctx.fillRect(x+1, y+1, sw-2, sausageH-2);
      ctx.fillRect(x, y+3, sw, sausageH-6);
      // Cuerpo principal
      ctx.fillStyle = palette.chorizoBase;
      ctx.fillRect(x+1, y+1, sw-2, sausageH-3);
      ctx.fillRect(x, y+3, sw, sausageH-7);
      ctx.fillRect(x+2, y, sw-4, sausageH-2);
      // Highlight superior (brillo cilíndrico)
      ctx.fillStyle = palette.chorizoLight;
      ctx.fillRect(x+3, y+1, sw-6, 2);
      ctx.fillRect(x+5, y, sw-10, 1);
      // Atado izquierdo
      ctx.fillStyle = palette.chorizoShade;
      ctx.fillRect(x-1, y+5, 2, 4);
      ctx.fillStyle = palette.chorizoString;
      ctx.fillRect(x-3, y+6, 1, 2);
      // Atado derecho
      ctx.fillStyle = palette.chorizoShade;
      ctx.fillRect(x+sw-1, y+5, 2, 4);
      ctx.fillStyle = palette.chorizoString;
      ctx.fillRect(x+sw+2, y+6, 1, 2);
      // Granitos pseudoaleatorios pero estables (basados en posición)
      const seed = (Math.floor(x/3) + Math.floor(y/5)) | 0;
      ctx.fillStyle = palette.chorizoFat;
      ctx.fillRect(x+8+(seed%5), y+4, 1, 1);
      ctx.fillRect(x+18+(seed%7), y+8, 1, 1);
      ctx.fillRect(x+30+(seed%4), y+5, 1, 1);
      ctx.fillStyle = palette.chorizoSpeck;
      ctx.fillRect(x+14+(seed%6), y+9, 1, 1);
      ctx.fillRect(x+26+(seed%5), y+3, 1, 1);
    };

    const drawKnot = (x, y) => {
      // Nudo de cuerda entre chorizos
      ctx.fillStyle = palette.chorizoString;
      ctx.fillRect(x+sw/2-2, y, 4, knotH);
      ctx.fillRect(x+sw/2-3, y+1, 6, knotH-2);
      // Sombra del nudo
      ctx.fillStyle = '#9a8868';
      ctx.fillRect(x+sw/2-3, y+knotH-1, 6, 1);
    };

    const drawHook = (x, y, fromTop) => {
      // Gancho metálico que sujeta la ristra (al techo o al suelo)
      ctx.fillStyle = palette.grillFrame;
      if(fromTop){
        // Línea desde el techo hasta la ristra
        ctx.fillRect(x+sw/2-1, 0, 2, y);
        // Gancho curvado
        ctx.fillStyle = palette.grillBarLight;
        ctx.fillRect(x+sw/2-3, y, 6, 3);
        ctx.fillRect(x+sw/2-1, y+3, 2, 2);
      } else {
        // Línea desde la ristra hasta el suelo
        ctx.fillRect(x+sw/2-1, y, 2, GROUND_Y-y);
        ctx.fillStyle = palette.grillBarLight;
        ctx.fillRect(x+sw/2-3, y-3, 6, 3);
      }
    };

    const xLeft = p.x + 4;

    // Ristra superior — cuelga desde el techo hasta gapY
    const topEnd = p.gapY;
    drawHook(xLeft, 0, true);
    let y = 4;
    while(y + sausageH <= topEnd - 2){
      drawSausage(xLeft, y);
      y += sausageH;
      if(y + knotH <= topEnd - 2){
        drawKnot(xLeft, y);
        y += knotH;
      }
    }

    // Ristra inferior — emerge desde gapY+PIPE_GAP hasta el suelo
    const botStart = p.gapY + PIPE_GAP;
    drawHook(xLeft, botStart, false);
    let y2 = botStart + 2;
    while(y2 + sausageH <= GROUND_Y - 2){
      drawSausage(xLeft, y2);
      y2 += sausageH;
      if(y2 + knotH <= GROUND_Y - 2){
        drawKnot(xLeft, y2);
        y2 += knotH;
      }
    }
  }

  function drawBird(){
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    // ═══ MANGO LARGO (cola hacia la izquierda) ═══
    // Barra principal del mango (alambre doble paralelo)
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(-26, -2, 14, 1);
    ctx.fillRect(-26,  1, 14, 1);
    ctx.fillStyle = palette.grillBarHigh;
    ctx.fillRect(-26, -2, 14, 1); // brillo cromado
    // Aro/agarradera al final del mango
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(-30, -3, 1, 7);  // lateral izquierdo (curva)
    ctx.fillRect(-29, -4, 2, 1);  // arco superior
    ctx.fillRect(-29,  3, 2, 1);  // arco inferior
    ctx.fillStyle = palette.grillBarHigh;
    ctx.fillRect(-30, -3, 1, 4);  // brillo del aro

    // ═══ MARCOS DE LA PARRILLA (rejilla doble vista de perfil) ═══
    // Marco superior (rejilla de arriba)
    ctx.fillStyle = palette.grillBarHigh;
    ctx.fillRect(-12, -6, 24, 1);
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(-12, -5, 24, 1);
    // Marco inferior (rejilla de abajo)
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(-12,  3, 24, 1);
    ctx.fillStyle = palette.grillFrame;
    ctx.fillRect(-12,  4, 24, 1);

    // ═══ BARRAS VERTICALES (las "rejas" finas) ═══
    ctx.fillStyle = palette.grillBarLight;
    for(let x = -11; x <= 11; x += 2){
      ctx.fillRect(x, -5, 1, 9);
    }

    // ═══ CHORICILLOS ASÁNDOSE ENTRE LAS REJILLAS ═══
    // Chorizo 1
    ctx.fillStyle = palette.chorizoShade;
    ctx.fillRect(-9, -2, 7, 4);
    ctx.fillStyle = palette.chorizoBase;
    ctx.fillRect(-9, -2, 7, 3);
    ctx.fillStyle = palette.chorizoLight;
    ctx.fillRect(-8, -2, 5, 1);
    // Chorizo 2
    ctx.fillStyle = palette.chorizoShade;
    ctx.fillRect( 2, -2, 7, 4);
    ctx.fillStyle = palette.chorizoBase;
    ctx.fillRect( 2, -2, 7, 3);
    ctx.fillStyle = palette.chorizoLight;
    ctx.fillRect( 3, -2, 5, 1);
    // Marcas de parrilla quemada en los chorizos (líneas verticales más oscuras)
    ctx.fillStyle = palette.coal;
    ctx.fillRect(-7, -2, 1, 4);
    ctx.fillRect(-4, -2, 1, 4);
    ctx.fillRect( 4, -2, 1, 4);
    ctx.fillRect( 7, -2, 1, 4);

    // ═══ RE-DIBUJADO de algunas barras verticales POR ENCIMA ═══
    // (efecto: las rejas pasan delante de los chorizos)
    ctx.fillStyle = palette.grillBarLight;
    ctx.fillRect(-9, -2, 1, 4);
    ctx.fillRect(-5, -2, 1, 4);
    ctx.fillRect(-1, -2, 1, 4);
    ctx.fillRect( 3, -2, 1, 4);
    ctx.fillRect( 7, -2, 1, 4);

    // ═══ BARRAS TRANSVERSALES (refuerzos horizontales como en la foto) ═══
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(-12, -1, 24, 1);

    // ═══ PATAS DE ALAMBRE (4, vemos 2 en perfil) ═══
    ctx.fillStyle = palette.grillBar;
    // Pata delantera
    ctx.fillRect( 9, 4, 1, 6);
    ctx.fillRect( 7, 9, 4, 1);  // pie
    // Pata trasera
    ctx.fillRect(-10, 4, 1, 6);
    ctx.fillRect(-12, 9, 4, 1); // pie

    // ═══ ASA FRONTAL (forma de "U" pequeña a la derecha) ═══
    ctx.fillStyle = palette.grillBar;
    ctx.fillRect(12, -3, 1, 6);  // lateral
    ctx.fillRect(13, -3, 1, 1);  // arriba
    ctx.fillRect(13,  2, 1, 1);  // abajo
    ctx.fillStyle = palette.grillBarHigh;
    ctx.fillRect(12, -3, 1, 1);  // brillo

    // ═══ HUMO subiendo de la parrilla (sólo cuando aletea) ═══
    if(bird.vy < -2){
      ctx.fillStyle = 'rgba(220,220,220,0.5)';
      ctx.fillRect(-4, -9, 2, 2);
      ctx.fillRect( 2, -11, 2, 2);
      ctx.fillStyle = 'rgba(220,220,220,0.3)';
      ctx.fillRect(-1, -14, 2, 2);
    }

    // ═══ Líneas de velocidad detrás del mango ═══
    if(bird.vy < 0){
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(-34, 0, 4, 1);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(-37, -1, 3, 1);
      ctx.fillRect(-37,  1, 3, 1);
    }

    ctx.restore();
  }

  function drawParticles(){
    for(const p of particles){
      ctx.fillStyle = p.col;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.s, p.s);
    }
  }

  // ─── HUD ──────────────────────────────────────────────────────────────
  function drawText(txt, x, y, size=16, color='#fff', shadow=true, align='center'){
    ctx.font = `${size}px "Press Start 2P", monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    if(shadow){
      ctx.fillStyle = 'rgba(0,0,0,.6)';
      ctx.fillText(txt, x+2, y+2);
    }
    ctx.fillStyle = color;
    ctx.fillText(txt, x, y);
  }

  function drawHUD(){
    if(state===STATE.PLAY || state===STATE.DEAD){
      drawText(String(score), W/2, 40, 32, '#fff');
    }
    if(state===STATE.READY){
      drawText('FLAPPY', W/2, 110, 28, '#fff');
      drawText('BARDENAS',  W/2, 150, 22, '#ff6a3a');
      drawText('TAP TO START', W/2, 380, 12, '#fff');
      // pequeña instrucción
      ctx.fillStyle='rgba(0,0,0,.35)';
      ctx.fillRect(W/2-90, 410, 180, 32);
      drawText('SPACE / ↑ / TAP', W/2, 420, 8, '#fff', false);
    }
    if(state===STATE.DEAD){
      const px = W/2-110, py = 200, pw=220, ph=180;
      // tarjeta
      ctx.fillStyle = 'rgba(20,15,30,.85)';
      ctx.fillRect(px-3, py-3, pw+6, ph+6);
      ctx.fillStyle = '#2a1f3a';
      ctx.fillRect(px, py, pw, ph);
      // borde
      ctx.fillStyle = '#ffd84a';
      ctx.fillRect(px, py, pw, 3);
      ctx.fillRect(px, py+ph-3, pw, 3);
      ctx.fillRect(px, py, 3, ph);
      ctx.fillRect(px+pw-3, py, 3, ph);

      drawText('GAME OVER', W/2, py+18, 16, '#ff5a5a');
      drawText('SCORE',  W/2-50, py+60, 10, '#aaa');
      drawText(String(score), W/2-50, py+78, 18, '#fff');
      drawText('BEST',  W/2+50, py+60, 10, '#aaa');
      drawText(String(best),  W/2+50, py+78, 18, '#ffd84a');

      if(score>0 && score===best && score>1) drawText('NEW RECORD!', W/2, py+115, 10, '#6cff6c');
      drawText('TAP TO RETRY', W/2, py+ph-26, 10, '#fff');
    }
  }

  // ─── LÓGICA ───────────────────────────────────────────────────────────
  function spawnPipe(){
    const minY = 70, maxY = GROUND_Y - PIPE_GAP - 70;
    const gapY = Math.floor(minY + Math.random()*(maxY-minY));
    pipes.push({x: W+10, gapY, scored:false});
  }

  function emitFeathers(x,y,n=6){
    for(let i=0;i<n;i++){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*3 - 1,
        vy: (Math.random()-1)*2,
        life: 25+Math.random()*15,
        s: 1+Math.floor(Math.random()*2),
        col: ['#ff5520','#ffaa44','#ffe066','#cdcdcd','#a8281a'][Math.floor(Math.random()*5)],
        g: -0.05  // las chispas suben (calor convectivo)
      });
    }
  }
  function emitExplosion(x,y){
    for(let i=0;i<26;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 1+Math.random()*4;
      particles.push({
        x,y,
        vx: Math.cos(ang)*sp,
        vy: Math.sin(ang)*sp - 1,
        life: 30+Math.random()*25,
        s: 2+Math.floor(Math.random()*3),
        col: ['#ff5520','#ffaa44','#ffe066','#2a1a14','#7a4818','#a8a8a8'][Math.floor(Math.random()*6)],
        g: 0.22
      });
    }
  }

  function flap(){
    if(state===STATE.READY){
      state = STATE.PLAY;
    }
    if(state===STATE.PLAY){
      bird.vy = FLAP;
      bird.flapPhase = 0;
      sfx.flap();
      emitFeathers(bird.x-6, bird.y+4, 3);
    } else if(state===STATE.DEAD){
      // cooldown corto para evitar reinicio accidental
      if(deadAt && performance.now()-deadAt > 600) reset();
    }
  }

  let deadAt = 0;
  function die(){
    if(!bird.alive) return;
    bird.alive = false;
    state = STATE.DEAD;
    deadAt = performance.now();
    if(score>best) best = score;
    shake = 14;
    sfx.hit(); setTimeout(sfx.die, 180);
    emitExplosion(bird.x, bird.y);
  }

  function reset(){
    bird.x = 90; bird.y = H/2; bird.vy = 0; bird.rot = 0; bird.alive = true;
    pipes = []; particles = []; pipeTimer = 0; score = 0; frame = 0;
    state = STATE.READY; dayPhase = 0; shake = 0;
  }

  // ─── COLISIONES ───────────────────────────────────────────────────────
  function collide(){
    if(bird.y - bird.r < -8){ bird.y = -8 + bird.r; bird.vy = 0; }
    if(bird.y + bird.r >= GROUND_Y){ bird.y = GROUND_Y - bird.r; die(); return; }
    for(const p of pipes){
      if(bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W){
        if(bird.y - bird.r < p.gapY || bird.y + bird.r > p.gapY + PIPE_GAP){
          die(); return;
        }
      }
    }
  }

  // ─── LOOP ─────────────────────────────────────────────────────────────
  function update(){
    frame++;
    if(state===STATE.PLAY){
      // bird
      bird.vy += G;
      bird.y += bird.vy;
      bird.flapPhase += 0.4;
      bird.rot = Math.max(-0.5, Math.min(1.4, bird.vy*0.08));

      // pipes
      pipeTimer++;
      if(pipeTimer >= PIPE_INTERVAL){ pipeTimer = 0; spawnPipe(); }
      for(const p of pipes){
        p.x -= PIPE_SPEED;
        if(!p.scored && p.x + PIPE_W < bird.x){
          p.scored = true; score++;
          sfx.score();
          dayPhase = ((score)/20) % 1; // ciclo cada 20 puntos (día→noche→día)
        }
      }
      pipes = pipes.filter(p => p.x + PIPE_W > -10);

      groundOffset += PIPE_SPEED;
      collide();
    } else if(state===STATE.READY){
      // bird flota suavemente
      bird.y = H/2 + Math.sin(frame*0.08)*8;
      bird.flapPhase += 0.3;
      bird.rot = 0;
    } else if(state===STATE.DEAD){
      // caída tras la muerte
      if(bird.y + bird.r < GROUND_Y){
        bird.vy += G;
        bird.y += bird.vy;
        bird.rot = Math.min(bird.rot + 0.08, 1.6);
      }
    }

    // partículas
    for(const p of particles){
      p.vy += p.g||0.2;
      p.x += p.vx; p.y += p.vy;
      p.life--;
    }
    particles = particles.filter(p=>p.life>0 && p.y < H);

    if(shake>0) shake *= 0.85;
  }

  function render(){
    // shake offset
    const sx = (Math.random()-0.5)*shake, sy = (Math.random()-0.5)*shake;
    ctx.save();
    ctx.translate(sx, sy);

    drawSky();
    drawClouds();
    drawMountains();

    // pipes
    if(state!==STATE.READY) for(const p of pipes) drawPipe(p);

    drawGround();
    drawParticles();
    drawBird();
    drawHUD();

    ctx.restore();
  }

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();

  // ─── INPUT ────────────────────────────────────────────────────────────
  const onPress = (e) => {
    if(e) e.preventDefault();
    initAudio();
    flap();
  };
  window.addEventListener('keydown', e => {
    if(e.code === 'Space' || e.code === 'ArrowUp'){ onPress(e); }
  });
  canvas.addEventListener('mousedown', onPress);
  canvas.addEventListener('touchstart', onPress, {passive:false});

  // resize: mantener proporción
  function fit(){
    const stage = document.getElementById('stage');
    const ratio = W/H;
    const winRatio = window.innerWidth/window.innerHeight;
    if(winRatio > ratio){
      stage.style.height = '100%';
      stage.style.width = (window.innerHeight*ratio)+'px';
    } else {
      stage.style.width = '100%';
      stage.style.height = (window.innerWidth/ratio)+'px';
    }
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
</body>
</html>
