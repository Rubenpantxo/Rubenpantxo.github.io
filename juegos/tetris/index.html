<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Agrícola - La Cosecha Perfecta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D982 40%, #8B7355 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* Nubes animadas */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.7;
            animation: float 20s infinite;
        }
        .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 20%;
            animation-duration: 25s;
        }
        .cloud1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }
        .cloud2 {
            width: 80px;
            height: 35px;
            top: 30%;
            animation-duration: 30s;
            animation-delay: -5s;
        }
        .cloud2::before {
            width: 60px;
            height: 40px;
            top: -20px;
            right: 15px;
        }
        @keyframes float {
            0% { left: -200px; }
            100% { left: calc(100% + 200px); }
        }
        .game-container {
            background: rgba(255, 248, 220, 0.95);
            border: 8px solid #8B4513;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 30px;
            position: relative;
            z-index: 10;
        }
        .game-board {
            position: relative;
        }
        canvas {
            border: 4px solid #654321;
            border-radius: 8px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            background-image:
                repeating-linear-gradient(
                    0deg,
                    #8B7355,
                    #8B7355 2px,
                    #7A6248 2px,
                    #7A6248 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(101, 67, 33, 0.1),
                    rgba(101, 67, 33, 0.1) 20px,
                    transparent 20px,
                    transparent 40px
                );
            background-size: 100% 100%, 40px 40px;
        }
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }
        .score-board {
            background: #F5DEB3;
            border: 3px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .score-board h3 {
            color: #654321;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.2em;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 1.1em;
            color: #4A3628;
        }
        .score-value {
            font-weight: 600;
            color: #2D5016;
        }
        .controls {
            background: #F5DEB3;
            border: 3px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .controls h3 {
            color: #654321;
            margin-bottom: 15px;
            text-align: center;
        }
        .control-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.9em;
            color: #4A3628;
        }
        .key {
            background: #8B4513;
            color: #FFF8DC;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        button {
            background: linear-gradient(135deg, #8FBC8F, #6B8E23);
            color: white;
            border: 3px solid #556B2F;
            padding: 12px 25px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-family: 'Fredoka', sans-serif;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #9ACD32, #6B8E23);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #999;
            border-color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(139, 69, 19, 0.95);
            color: #FFF8DC;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 20;
        }
        .game-over h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }
        .game-over p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .next-piece {
            background: #F5DEB3;
            border: 3px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .next-piece h3 {
            color: #654321;
            margin-bottom: 10px;
            text-align: center;
        }
        .next-canvas {
            border: 2px solid #654321;
            border-radius: 5px;
            background: rgba(139, 115, 85, 0.1);
        }
        /* Decoraciones de granja */
        .farm-decoration {
            position: absolute;
            z-index: 1;
        }
        .barn {
            bottom: 10px;
            right: 10px;
            width: 60px;
            height: 60px;
            background: #8B4513;
            position: absolute;
        }
        .barn::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 25px solid #B22222;
            top: -25px;
        }
        .title {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #2D5016;
            font-size: 2em;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }
        .title::before {
            content: '🌾';
            margin-right: 10px;
        }
        .title::after {
            content: '🚜';
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                transform: scale(0.9);
            }
            .title {
                top: -45px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <!-- Nubes decorativas -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <!-- Decoración de granero -->
    <div class="barn"></div>
    <div class="game-container">
        <h1 class="title">Tetris Agrícola</h1>
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>¡Cosecha Completada!</h2>
                <p>Puntuación Final: <span id="finalScore">0</span></p>
                <button onclick="resetGame()">Nueva Siembra</button>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-board">
                <h3>🌻 Estadísticas</h3>
                <div class="score-item">
                    <span>Cosecha:</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span>Líneas:</span>
                    <span class="score-value" id="lines">0</span>
                </div>
                <div class="score-item">
                    <span>Nivel:</span>
                    <span class="score-value" id="level">1</span>
                </div>
            </div>
            <div class="next-piece">
                <h3>🌱 Próxima Cosecha</h3>
                <canvas id="nextCanvas" class="next-canvas" width="120" height="100"></canvas>
            </div>
            <div class="controls">
                <h3>🎮 Controles</h3>
                <div class="control-item">
                    <span>Mover:</span>
                    <span><span class="key">←</span> <span class="key">→</span></span>
                </div>
                <div class="control-item">
                    <span>Rotar:</span>
                    <span class="key">↑</span>
                </div>
                <div class="control-item">
                    <span>Acelerar:</span>
                    <span class="key">↓</span>
                </div>
                <div class="control-item">
                    <span>Caída Rápida:</span>
                    <span class="key">ESP</span>
                </div>
                <div class="control-item">
                    <span>Pausa:</span>
                    <span class="key">P</span>
                </div>
            </div>
            <button id="startBtn" onclick="startGame()">🌾 Comenzar Siembra</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameOver = false;
        let isPaused = false;
        let dropTime = 1000;
        let lastDrop = 0;
        let animationId = null;
        // URL base donde están alojadas tus imágenes en GitHub
        const IMAGE_BASE_URL = 'https://rubenpantxo.github.io/juegos/tetris/';
        // Definición de formas y vinculación de las texturas
        const PIECE_DEFS = {
            I: { shape: [[1, 1, 1, 1]], img: 'Tetris_Trigo.png' },             // Barra
            O: { shape: [[1, 1], [1, 1]], img: 'Tetris_Lechuga.png' },         // Cuadrado
            T: { shape: [[0, 1, 0], [1, 1, 1]], img: 'Tetris_Alcachofa.png' }, // Forma T
            S: { shape: [[0, 1, 1], [1, 1, 0]], img: 'Tetris_Esparrago.png' }, // Forma S
            Z: { shape: [[1, 1, 0], [0, 1, 1]], img: 'Tetris_Maiz.png' },      // Forma Z
            J: { shape: [[1, 0, 0], [1, 1, 1]], img: 'Tetris_Coliflor.png' },  // Forma J
            L: { shape: [[0, 0, 1], [1, 1, 1]], img: 'Tetris_Brocoli.png' }    // Forma L
        };
        // Precargar las imágenes desde GitHub
        const loadedImages = {};
        Object.keys(PIECE_DEFS).forEach(key => {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; // Evita problemas de CORS al dibujar en el canvas
            img.src = IMAGE_BASE_URL + PIECE_DEFS[key].img;
            loadedImages[key] = img;
        });
        class Piece {
            constructor(type) {
                this.type = type;
                const def = PIECE_DEFS[type];
                this.shape = [];
                const rows = def.shape.length;
                const cols = def.shape[0].length;
                // Generamos una matriz pero guardando las coordenadas de corte de la imagen
                // para que cuando la pieza se rote o se divida, cada bloque sepa qué trozo
                // de imagen le corresponde mostrar.
                for (let r = 0; r < rows; r++) {
                    this.shape[r] = [];
                    for (let c = 0; c < cols; c++) {
                        if (def.shape[r][c]) {
                            this.shape[r][c] = {
                                type: type,
                                imgX: c, // Columna de corte en la imagen original
                                imgY: r, // Fila de corte en la imagen original
                                totalCols: cols,
                                totalRows: rows
                            };
                        } else {
                            this.shape[r][c] = null;
                        }
                    }
                }
                this.x = Math.floor((COLS - cols) / 2);
                this.y = 0;
            }
            rotate() {
                const rotated = [];
                const rows = this.shape.length;
                const cols = this.shape[0].length;
                for (let c = 0; c < cols; c++) {
                    rotated[c] = [];
                    for (let r = rows - 1; r >= 0; r--) {
                        rotated[c].push(this.shape[r][c]);
                    }
                }
                return rotated;
            }
        }
        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
        }
        function drawBlock(x, y, blockData, targetCtx = ctx, targetBlockSize = BLOCK_SIZE) {
            if (!blockData) return;
            const img = loadedImages[blockData.type];
            if (img && img.complete && img.naturalWidth > 0) {
                // Calcular el tamaño exacto del corte de la imagen para este bloque
                const sliceW = img.width / blockData.totalCols;
                const sliceH = img.height / blockData.totalRows;
                const sx = blockData.imgX * sliceW;
                const sy = blockData.imgY * sliceH;
                // Dibujar el trozo de la imagen correspondiente en su sitio
                targetCtx.drawImage(
                    img,
                    sx, sy, sliceW, sliceH,
                    x * targetBlockSize, y * targetBlockSize, targetBlockSize, targetBlockSize
                );
                // Un pequeñísimo borde translúcido para que se vea la cuadrícula entre bloques
                targetCtx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                targetCtx.lineWidth = 1;
                targetCtx.strokeRect(x * targetBlockSize, y * targetBlockSize, targetBlockSize, targetBlockSize);

                // Un brillo muy sutil en la parte superior del bloque para darle volumen a la pieza
                targetCtx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                targetCtx.fillRect(x * targetBlockSize + 1, y * targetBlockSize + 1, targetBlockSize - 2, 3);
            } else {
                // Fallback (color sólido) en caso de que tarde en cargar la imagen de GitHub
                targetCtx.fillStyle = '#4A5D23';
                targetCtx.fillRect(x * targetBlockSize, y * targetBlockSize, targetBlockSize, targetBlockSize);
                targetCtx.strokeStyle = 'rgba(0,0,0,0.5)';
                targetCtx.strokeRect(x * targetBlockSize, y * targetBlockSize, targetBlockSize, targetBlockSize);
            }
        }
        function drawBoard() {
            // Limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Dibujar surcos del campo de fondo
            ctx.strokeStyle = 'rgba(101, 67, 33, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i < ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            // Dibujar bloques asentados en el tablero
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        drawBlock(col, row, board[row][col]);
                    }
                }
            }
            // Dibujar pieza actual en movimiento
            if (currentPiece && !gameOver) {
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            drawBlock(
                                currentPiece.x + col,
                                currentPiece.y + row,
                                currentPiece.shape[row][col]
                            );
                        }
                    }
                }
                drawGhostPiece();
            }
        }
        function drawGhostPiece() {
            if (!currentPiece) return;
            let ghostY = currentPiece.y;
            while (isValidMove(currentPiece.shape, currentPiece.x, ghostY + 1)) {
                ghostY++;
            }
            ctx.save();
            ctx.globalAlpha = 0.35; // Hacemos la textura semi-transparente
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        drawBlock(
                            currentPiece.x + col,
                            ghostY + row,
                            currentPiece.shape[row][col],
                            ctx,
                            BLOCK_SIZE
                        );
                        // Borde adicional para que la sombra se vea más clara
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.strokeRect(
                            (currentPiece.x + col) * BLOCK_SIZE,
                            (ghostY + row) * BLOCK_SIZE,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                    }
                }
            }
            ctx.restore();
        }
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const blockSize = 20;
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * blockSize) / 2;
                for (let row = 0; row < nextPiece.shape.length; row++) {
                    for (let col = 0; col < nextPiece.shape[row].length; col++) {
                        if (nextPiece.shape[row][col]) {
                            drawBlock(
                                offsetX / blockSize + col,
                                offsetY / blockSize + row,
                                nextPiece.shape[row][col],
                                nextCtx,
                                blockSize
                            );
                        }
                    }
                }
            }
        }
        function isValidMove(shape, offsetX, offsetY) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const newX = offsetX + col;
                        const newY = offsetY + row;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return false;
                        }

                        // Verificar colisión con otras piezas en el tablero
                        if (newY >= 0 && board[newY][newX] !== null) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        function lockPiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const y = currentPiece.y + row;
                        const x = currentPiece.x + col;
                        if (y < 0) {
                            gameOver = true;
                            showGameOver();
                            return;
                        }

                        // Guardamos la configuración del trozo de textura exacto en el tablero
                        board[y][x] = currentPiece.shape[row][col];
                    }
                }
            }
            clearLines();
            spawnPiece();
        }
        function clearLines() {
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                // Comprobamos si la fila está completamente llena
                if (board[row].every(cell => cell !== null)) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(null));
                    linesCleared++;
                    row++; // Volver a comprobar la misma fila que ha caído
                }
            }
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                // Aumentar nivel cada 10 líneas
                level = Math.floor(lines / 10) + 1;
                dropTime = Math.max(100, 1000 - (level - 1) * 100);
                updateScore();
                // Efecto visual de líneas completadas
                ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                setTimeout(() => drawBoard(), 100);
            }
        }
        function spawnPiece() {
            const pieces = Object.keys(PIECE_DEFS);
            if (!nextPiece) {
                nextPiece = new Piece(pieces[Math.floor(Math.random() * pieces.length)]);
            }
            currentPiece = nextPiece;
            nextPiece = new Piece(pieces[Math.floor(Math.random() * pieces.length)]);
            drawNextPiece();
            if (!isValidMove(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameOver = true;
                showGameOver();
            }
        }
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('lines').textContent = lines;
            document.getElementById('level').textContent = level;
        }
        function showGameOver() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';

            const startBtn = document.getElementById('startBtn');
            startBtn.textContent = '🌾 Nueva Siembra';
            startBtn.disabled = false;
        }
        function resetGame() {
            if (animationId) cancelAnimationFrame(animationId);

            initBoard();
            score = 0;
            lines = 0;
            level = 1;
            dropTime = 1000;
            gameOver = false;
            isPaused = false;
            currentPiece = null;
            nextPiece = null;
            updateScore();
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        function startGame() {
            if (gameOver) {
                resetGame();
                return;
            }
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.textContent = '🚜 Cultivando...';
            startBtn.blur(); // Quitar el foco para evitar activaciones con espacio
            lastDrop = performance.now(); // Asegura un inicio de tiempo limpio
            spawnPiece();
            gameLoop(performance.now());
        }
        function gameLoop(currentTime) {
            if (gameOver) return;
            if (!isPaused) {
                if (currentTime - lastDrop > dropTime) {
                    moveDown();
                    lastDrop = currentTime;
                }
                drawBoard();
            }
            animationId = requestAnimationFrame(gameLoop);
        }
        function moveLeft() {
            if (!currentPiece || gameOver || isPaused) return;
            if (isValidMove(currentPiece.shape, currentPiece.x - 1, currentPiece.y)) {
                currentPiece.x--;
                drawBoard();
            }
        }
        function moveRight() {
            if (!currentPiece || gameOver || isPaused) return;
            if (isValidMove(currentPiece.shape, currentPiece.x + 1, currentPiece.y)) {
                currentPiece.x++;
                drawBoard();
            }
        }
        function moveDown() {
            if (!currentPiece || gameOver || isPaused) return;
            if (isValidMove(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        }
        function hardDrop() {
            if (!currentPiece || gameOver || isPaused) return;
            let cellsDropped = 0;
            while (isValidMove(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
                cellsDropped++;
            }
            score += cellsDropped * 2;
            lockPiece();
            updateScore();
            drawBoard();
        }
        function rotatePiece() {
            if (!currentPiece || gameOver || isPaused) return;
            const rotated = currentPiece.rotate();

            // Lógica de Wall Kick (empujar pieza si toca borde)
            if (isValidMove(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            } else if (isValidMove(rotated, currentPiece.x - 1, currentPiece.y)) {
                currentPiece.x -= 1;
                currentPiece.shape = rotated;
            } else if (isValidMove(rotated, currentPiece.x + 1, currentPiece.y)) {
                currentPiece.x += 1;
                currentPiece.shape = rotated;
            } else if (currentPiece.shape[0].length >= 3) {
                // Para piezas largas intentamos mover hasta 2 espacios
                if (isValidMove(rotated, currentPiece.x - 2, currentPiece.y)) {
                    currentPiece.x -= 2;
                    currentPiece.shape = rotated;
                } else if (isValidMove(rotated, currentPiece.x + 2, currentPiece.y)) {
                    currentPiece.x += 2;
                    currentPiece.shape = rotated;
                }
            }

            drawBoard();
        }
        function togglePause() {
            if (gameOver || !currentPiece) return;
            isPaused = !isPaused;
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Fredoka';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
                ctx.font = '18px Fredoka';
                ctx.fillText('Presiona P para continuar', canvas.width / 2, canvas.height / 2 + 40);
            } else {
                // Al quitar la pausa, reseteamos el tiempo para que no caiga de golpe
                lastDrop = performance.now();
            }
        }
        // Controles del teclado mejorados
        document.addEventListener('keydown', (e) => {
            // Prevenir scroll en las teclas principales del juego
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            if (!currentPiece || gameOver) return;
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    score++;
                    updateScore();
                    lastDrop = performance.now(); // Reiniciar contador de caída al forzar bajada
                    drawBoard();
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case ' ': // Barra espaciadora
                    hardDrop();
                    lastDrop = performance.now();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
            }
        });
        // Controles táctiles para móvil
        let touchStartX = null;
        let touchStartY = null;
        canvas.addEventListener('touchstart', (e) => {
            if (gameOver || isPaused) return;
            e.preventDefault(); // Evita scroll al tocar el lienzo
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if (gameOver || isPaused || !touchStartX || !touchStartY) return;
            e.preventDefault();
            const touchEndX = e.touches[0].clientX;
            const touchEndY = e.touches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            // Umbral de sensibilidad para el deslizamiento
            const threshold = 30;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Movimiento Horizontal
                if (diffX > threshold) {
                    moveRight();
                    touchStartX = touchEndX;
                } else if (diffX < -threshold) {
                    moveLeft();
                    touchStartX = touchEndX;
                }
            } else {
                // Movimiento Vertical
                if (diffY > threshold) {
                    moveDown();
                    score++;
                    updateScore();
                    lastDrop = performance.now();
                    touchStartY = touchEndY; // Actualizar para seguir bajando
                }
            }
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            if (gameOver || isPaused) return;
            const touchEndTime = new Date().getTime();
            const touchDuration = touchEndTime - (window.lastTouchEnd || 0);
            // Si fue un toque rápido (tap) sin deslizar mucho, rotamos
            if (touchDuration < 200 && touchStartX !== null) {
                rotatePiece();
            }
            window.lastTouchEnd = touchEndTime;
            touchStartX = null;
            touchStartY = null;
        });
        // Inicialización visual (antes de dar a comenzar)
        initBoard();
        drawBoard();
        updateScore();
    </script>
</body>
</html>
