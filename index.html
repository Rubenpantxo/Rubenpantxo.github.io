<style>
/* ===== PANTXIKO NOTES - BOTÓN FLOTANTE ===== */
.pantxiko-float-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 500;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; background: none; border: none; padding: 0;
    animation: pn-float 3.5s ease-in-out infinite;
}
.pantxiko-float-btn .pn-disc {
    width: 70px; height: 70px; border-radius: 50%;
    background: linear-gradient(145deg, rgba(255,252,230,0.97), rgba(245,235,200,0.95));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 22px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.18),
                inset 0 1px 0 rgba(255,255,255,0.85);
    transition: all 0.22s ease; overflow: hidden;
}
.pantxiko-float-btn:hover .pn-disc {
    box-shadow: 0 10px 32px rgba(245,197,24,0.55), 0 4px 14px rgba(0,0,0,0.22);
    transform: scale(1.1) rotate(-4deg);
}
.pantxiko-float-btn .pn-label {
    font-family: 'Kalam', cursive;
    font-size: 11px; color: rgba(255,250,220,0.95);
    margin-top: 5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    background: rgba(10,5,20,0.55);
    padding: 2px 9px; border-radius: 10px;
    backdrop-filter: blur(5px);
    white-space: nowrap;
}
@keyframes pn-float {
    0%,100%{ transform: translateY(0) }
    50%{ transform: translateY(-9px) }
}
.pantxiko-float-btn.launching .pn-disc {
    animation: pn-launch 0.48s ease-in forwards;
}
@keyframes pn-launch {
    0%  { transform: scale(1) rotate(0); opacity: 1 }
    40% { transform: scale(1.35) rotate(-8deg); opacity: 1 }
    100%{ transform: scale(0.7) translateY(-40px); opacity: 0 }
}
/* ===== PANTXIKO NOTES - MODAL ===== */
.pn-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(5,2,18,0.75);
    z-index: 2000; backdrop-filter: blur(7px);
    justify-content: center; align-items: center;
}
.pn-modal-overlay.open { display: flex; }
.pn-modal-wrap {
    width: 96%; max-width: 860px; height: 90vh;
    background: #0d0520;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 28px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.09);
    animation: pn-modal-in 0.42s cubic-bezier(0.34,1.56,0.64,1) forwards;
    transform: scale(0.82) translateY(18px); opacity: 0;
    display: flex; flex-direction: column;
}
@keyframes pn-modal-in {
    to { transform: scale(1) translateY(0); opacity: 1 }
}
.pn-modal-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 14px;
    background: rgba(0,0,0,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
}
.pn-modal-bar span {
    font-family: 'Kalam', cursive;
    font-size: 14px; color: rgba(255,248,215,0.9);
}
.pn-modal-bar button {
    background: rgba(255,255,255,0.1); border: none; color: white;
    width: 27px; height: 27px; border-radius: 50%; cursor: pointer;
    font-size: 15px; display: flex; align-items: center; justify-content: center;
    transition: background 0.18s;
}
.pn-modal-bar button:hover { background: rgba(220,50,50,0.55); }
.pn-modal-wrap iframe { flex: 1; width: 100%; border: none; }
</style>

<!-- MODAL PANTXIKO NOTES -->
<div class="pn-modal-overlay" id="pantxikoModal">
  <div class="pn-modal-wrap">
    <div class="pn-modal-bar">
      <span>🎙️ Pantxiko Notes 🗒</span>
      <button id="pantxikoModalClose" aria-label="Cerrar">✕</button>
    </div>
    <iframe src="apps/pantxiko-notes.html" title="Pantxiko Notes" allow="microphone" loading="lazy"></iframe>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Pantxiko Notes
    (function() {
        const btn   = document.getElementById('pantxikoBtn');
        const modal = document.getElementById('pantxikoModal');
        const close = document.getElementById('pantxikoModalClose');
        if (!btn) return;
        btn.addEventListener('click', () => {
            btn.classList.add('launching');
            setTimeout(() => {
                modal.classList.add('open');
                btn.classList.remove('launching');
            }, 440);
        });
        close.addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });
    })();
});
</script>
