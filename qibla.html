<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1814">
<title>القبلة · Brújula Qibla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a1814; --bg-mid: #14322a; --gold: #d4af37;
    --gold-bright: #f4d56b; --gold-dim: #8a7128;
    --cream: #f4f1e8; --cream-dim: #c9c1a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Cormorant Garamond', serif; color: var(--cream); background: var(--bg-deep); }
  body {
    min-height: 100vh; position: relative;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(212,175,55,.08), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(42,107,84,.25), transparent 70%),
      linear-gradient(180deg, #0a1814 0%, #14322a 50%, #0a1814 100%);
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; opacity: .07;
    background-image:
      radial-gradient(circle at 0% 0%, var(--gold) 1px, transparent 1px),
      radial-gradient(circle at 100% 0%, var(--gold) 1px, transparent 1px),
      radial-gradient(circle at 50% 50%, var(--gold) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><g fill='none' stroke='%23d4af37' stroke-width='.3' opacity='.4'><polygon points='50,5 61,39 95,39 67,60 78,95 50,73 22,95 33,60 5,39 39,39'/></g></svg>");
    background-size: 200px 200px; background-position: center; opacity: .06; pointer-events: none;
  }
  .container { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
  .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.25rem; text-align: center; gap: 1.25rem; min-height: 100vh; }
  .screen.active { display: flex; }
  .arabic-title { font-family: 'Amiri', serif; font-size: clamp(4rem, 18vw, 6.5rem); color: var(--gold); line-height: 1; text-shadow: 0 4px 24px rgba(212,175,55,.4); letter-spacing: -.02em; }
  .ornament { width: 80%; max-width: 240px; height: 24px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 24'><path d='M0 12h80 M160 12h80 M120 4l4 4 4-4-4-4z M120 20l4 4 4-4-4-4z M120 12l8 0 M112 12l-8 0' stroke='%23d4af37' stroke-width='1' fill='none'/><circle cx='120' cy='12' r='3' fill='none' stroke='%23d4af37'/></svg>");
    background-repeat: no-repeat; background-position: center; }
  .subtitle { font-size: 1.75rem; font-weight: 300; letter-spacing: .15em; text-transform: uppercase; color: var(--cream); }
  .description { font-size: 1.1rem; font-style: italic; color: var(--cream-dim); max-width: 340px; line-height: 1.5; font-weight: 300; }
  .section-title { font-size: .8rem; letter-spacing: .25em; text-transform: uppercase; color: var(--cream-dim); margin-top: .5rem; }
  .btn { padding: .85rem 1.5rem; font-family: inherit; font-size: 1rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
    color: var(--bg-deep); background: linear-gradient(135deg, var(--gold-bright), var(--gold)); border: none; border-radius: 2px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,175,55,.25), inset 0 1px 0 rgba(255,255,255,.4); transition: transform .2s, opacity .2s; width: 100%; max-width: 320px; }
  .btn:active { transform: scale(.97); }
  .btn-ghost { background: transparent; color: var(--gold-bright); border: 1px solid var(--gold-dim); box-shadow: none; }
  .btn-small { padding: .55rem 1rem; font-size: .85rem; letter-spacing: .08em; }
  .coord-input { display: flex; flex-direction: column; gap: .35rem; align-items: flex-start; width: 100%; }
  .coord-input label { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--cream-dim); }
  .coord-input input { width: 100%; padding: .7rem .9rem; font-family: inherit; font-size: 1.15rem; background: rgba(0,0,0,.3); border: 1px solid var(--gold-dim); border-radius: 2px; color: var(--gold-bright); outline: none; font-variant-numeric: tabular-nums; }
  .coord-input input:focus { border-color: var(--gold-bright); background: rgba(0,0,0,.5); }
  .coord-fields { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; width: 100%; max-width: 360px; }
  .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; width: 100%; max-width: 360px; }
  .preset-btn { padding: .65rem .5rem; font-family: inherit; font-size: .9rem; background: rgba(255,255,255,.04); border: 1px solid rgba(212,175,55,.25); color: var(--cream); border-radius: 2px; cursor: pointer; transition: all .2s; text-align: center; }
  .preset-btn:active, .preset-btn:hover { background: rgba(212,175,55,.15); border-color: var(--gold); color: var(--gold-bright); }
  .preset-btn strong { display: block; font-weight: 600; }
  .preset-btn span { display: block; font-size: .7rem; color: var(--cream-dim); font-style: italic; margin-top: .15rem; }
  .compass-screen { justify-content: space-between; }
  .header { text-align: center; }
  .header-arabic { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--gold); line-height: 1; }
  .header-label { font-size: .85rem; letter-spacing: .25em; text-transform: uppercase; color: var(--cream-dim); margin-top: .3rem; }
  .compass-wrap { position: relative; width: min(85vw, 360px); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  .device-pointer { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 14px solid var(--cream); z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
  .compass-frame { position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle, transparent 60%, rgba(212,175,55,.15) 70%, transparent 80%), conic-gradient(from 0deg, var(--gold-dim), var(--gold), var(--gold-dim), var(--gold), var(--gold-dim));
    padding: 4px; box-shadow: 0 0 0 1px var(--gold-dim), 0 0 40px rgba(212,175,55,.15), inset 0 0 40px rgba(0,0,0,.3); }
  .compass-frame::before { content: ''; position: absolute; inset: 4px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--bg-mid), var(--bg-deep) 70%); border: 1px solid var(--gold-dim); }
  .compass-ring { position: absolute; inset: 16px; border-radius: 50%; transition: transform .15s linear; will-change: transform; }
  .compass-ring svg { width: 100%; height: 100%; overflow: visible; }
  .compass-center { position: absolute; width: 70px; height: 70px; z-index: 3; pointer-events: none; }
  .qibla-needle { position: absolute; width: 100%; height: 100%; transition: transform .15s linear; will-change: transform; z-index: 4; pointer-events: none; }
  .qibla-needle svg { width: 100%; height: 100%; overflow: visible; }
  .compass-wrap.aligned .compass-frame { animation: pulse-gold 1.4s ease-in-out infinite; }
  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 1px var(--gold-dim), 0 0 40px rgba(212,175,55,.15), inset 0 0 40px rgba(0,0,0,.3); }
    50% { box-shadow: 0 0 0 1px var(--gold), 0 0 80px rgba(244,213,107,.6), inset 0 0 40px rgba(0,0,0,.3); }
  }
  .info-panel { width: 100%; display: flex; flex-direction: column; gap: .75rem; padding: 0 .5rem; }
  .alignment-status { text-align: center; font-style: italic; font-size: 1.05rem; color: var(--cream-dim); min-height: 1.5rem; transition: color .3s; letter-spacing: .03em; }
  .alignment-status.aligned { color: var(--gold-bright); font-weight: 500; font-style: normal; text-shadow: 0 0 12px rgba(244,213,107,.5); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; border-top: 1px solid rgba(212,175,55,.2); border-bottom: 1px solid rgba(212,175,55,.2); padding: .75rem 0; }
  .info-cell { text-align: center; padding: 0 .3rem; }
  .info-cell + .info-cell { border-left: 1px solid rgba(212,175,55,.15); }
  .info-label { display: block; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--cream-dim); margin-bottom: .25rem; }
  .info-value { display: block; font-size: 1.3rem; font-weight: 500; color: var(--gold-bright); font-variant-numeric: tabular-nums; }
  .footer-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: .5rem; padding: 0 .25rem; font-size: .8rem; color: var(--cream-dim); font-style: italic; gap: .5rem; }
  .source-tag { color: var(--gold-dim); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-align: left; }
  .info-box { background: rgba(212,175,55,.08); border: 1px solid rgba(212,175,55,.25); border-radius: 4px; padding: .8rem 1rem; color: var(--cream); font-size: .9rem; font-style: italic; text-align: center; max-width: 360px; line-height: 1.4; }
  .error-box { background: rgba(139,30,30,.2); border: 1px solid rgba(220,80,80,.3); color: #ffb3b3; }
  .no-sensor-note { text-align: center; font-size: .8rem; color: var(--cream-dim); font-style: italic; padding: 0 1rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(212,175,55,.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: .5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-height: 700px) { .arabic-title { font-size: clamp(3rem, 14vw, 5rem); } .subtitle { font-size: 1.4rem; } .compass-wrap { width: min(75vw, 300px); } .screen { gap: .9rem; padding: 1.5rem 1rem; } }
</style>
</head>
<body>

<div class="container">

  <div class="screen active" id="screen-welcome">
    <div class="arabic-title">القبلة</div>
    <div class="ornament"></div>
    <div class="subtitle">Brújula Qibla</div>
    <p class="description">Indica la dirección hacia la sagrada Ka'ba en La Meca desde tu ubicación actual</p>
    <button class="btn" id="btn-start">Comenzar</button>
  </div>

  <div class="screen" id="screen-location">
    <div class="arabic-title" style="font-size: clamp(2.5rem,12vw,4rem)">الموقع</div>
    <div class="subtitle" style="font-size:1.4rem">Tu ubicación</div>
    <p class="description">Elige cómo determinar dónde estás</p>

    <button class="btn" id="btn-gps">📍 Usar GPS</button>
    <button class="btn btn-ghost" id="btn-ip">🌐 Detectar por IP</button>

    <div class="section-title">o entrada manual</div>
    <div class="coord-fields">
      <div class="coord-input">
        <label>Latitud</label>
        <input type="number" id="in-lat" step="0.0001" placeholder="42.0312" inputmode="decimal">
      </div>
      <div class="coord-input">
        <label>Longitud</label>
        <input type="number" id="in-lon" step="0.0001" placeholder="-1.4321" inputmode="decimal">
      </div>
    </div>
    <button class="btn btn-ghost btn-small" id="btn-manual">Usar estas coordenadas</button>

    <div class="section-title">o ciudades</div>
    <div class="preset-grid">
      <button class="preset-btn" data-lat="42.0312" data-lon="-1.4326"><strong>Cabanillas</strong><span>Navarra</span></button>
      <button class="preset-btn" data-lat="40.4168" data-lon="-3.7038"><strong>Madrid</strong><span>España</span></button>
      <button class="preset-btn" data-lat="41.3851" data-lon="2.1734"><strong>Barcelona</strong><span>Cataluña</span></button>
      <button class="preset-btn" data-lat="37.3891" data-lon="-5.9845"><strong>Sevilla</strong><span>Andalucía</span></button>
      <button class="preset-btn" data-lat="39.4699" data-lon="-0.3763"><strong>Valencia</strong><span>C. Valenciana</span></button>
      <button class="preset-btn" data-lat="43.2630" data-lon="-2.9350"><strong>Bilbao</strong><span>Euskadi</span></button>
    </div>

    <div id="loc-status"></div>
  </div>

  <div class="screen compass-screen" id="screen-compass">
    <div class="header">
      <div class="header-arabic">مكة المكرمة</div>
      <div class="header-label">La Meca · Ka'ba</div>
    </div>

    <div class="compass-wrap" id="compassWrap">
      <div class="device-pointer"></div>
      <div class="compass-frame"></div>
      <div class="compass-ring" id="compassRing">
        <svg viewBox="-100 -100 200 200">
          <g stroke="#d4af37" stroke-linecap="round"></g>
          <circle cx="0" cy="0" r="78" fill="none" stroke="#d4af37" stroke-width=".4" opacity=".4"/>
          <circle cx="0" cy="0" r="60" fill="none" stroke="#d4af37" stroke-width=".3" opacity=".3"/>
          <g font-family="Cormorant Garamond, serif" text-anchor="middle" dominant-baseline="middle">
            <text x="0" y="-68" font-size="13" font-weight="700" fill="#f4d56b">N</text>
            <text x="68" y="0" font-size="11" font-weight="500" fill="#c9c1a8">E</text>
            <text x="0" y="68" font-size="11" font-weight="500" fill="#c9c1a8">S</text>
            <text x="-68" y="0" font-size="11" font-weight="500" fill="#c9c1a8">O</text>
          </g>
          <g font-family="Cormorant Garamond, serif" text-anchor="middle" dominant-baseline="middle"
             font-size="7" fill="#8a7128" font-style="italic">
            <text x="48" y="-48">NE</text>
            <text x="48" y="48">SE</text>
            <text x="-48" y="48">SO</text>
            <text x="-48" y="-48">NO</text>
          </g>
          <g font-family="Cormorant Garamond, serif" font-size="5" fill="#c9c1a8" text-anchor="middle" dominant-baseline="middle" id="degreeNumbers"></g>
        </svg>
      </div>
      <div class="qibla-needle" id="qiblaNeedle">
        <svg viewBox="-100 -100 200 200">
          <line x1="0" y1="0" x2="0" y2="-72" stroke="#d4af37" stroke-width=".5" stroke-dasharray="2 2" opacity=".5"/>
          <g transform="translate(0,-72)">
            <circle cx="0" cy="0" r="14" fill="#d4af37" opacity=".15"/>
            <rect x="-7" y="-8" width="14" height="16" fill="#1a1a1a" stroke="#d4af37" stroke-width=".6"/>
            <rect x="-7" y="-2" width="14" height="3" fill="#d4af37" opacity=".7"/>
            <rect x="-2" y="2" width="4" height="6" fill="#d4af37" opacity=".6"/>
          </g>
        </svg>
      </div>
      <div class="compass-center">
        <svg viewBox="-50 -50 100 100">
          <defs>
            <radialGradient id="starGrad" cx="50%" cy="50%">
              <stop offset="0%" stop-color="#f4d56b"/>
              <stop offset="60%" stop-color="#d4af37"/>
              <stop offset="100%" stop-color="#8a7128"/>
            </radialGradient>
          </defs>
          <g>
            <polygon points="0,-22 5,-5 22,0 5,5 0,22 -5,5 -22,0 -5,-5" fill="url(#starGrad)" opacity=".9"/>
            <polygon points="0,-15 4,-4 15,0 4,4 0,15 -4,4 -15,0 -4,-4" fill="#0a1814" stroke="#d4af37" stroke-width=".5"/>
            <circle cx="0" cy="0" r="5" fill="#d4af37"/>
            <circle cx="0" cy="0" r="2" fill="#0a1814"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="info-panel">
      <div class="alignment-status" id="alignmentStatus">Gira el dispositivo despacio</div>
      <div class="info-grid">
        <div class="info-cell">
          <span class="info-label">Qibla</span>
          <span class="info-value" id="qiblaAngle">--°</span>
        </div>
        <div class="info-cell">
          <span class="info-label">Distancia</span>
          <span class="info-value" id="distance">--</span>
        </div>
        <div class="info-cell">
          <span class="info-label">Brújula</span>
          <span class="info-value" id="currentHeading">--°</span>
        </div>
      </div>
      <div class="footer-row">
        <span class="source-tag" id="sourceTag">Ubicación</span>
        <button class="preset-btn" style="padding:.3rem .7rem;font-size:.75rem;width:auto" id="btn-back">↻ Cambiar</button>
      </div>
      <div id="noSensorNote"></div>
    </div>
  </div>

</div>

<script>
  const MECCA_LAT = 21.4225;
  const MECCA_LON = 39.8262;

  let userLat = null, userLon = null;
  let qiblaBearing = 0, currentHeading = 0;
  let hasOrientation = false, orientationStarted = false;

  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  function calcQiblaBearing(lat, lon) {
    const f1 = toRad(lat), f2 = toRad(MECCA_LAT), dl = toRad(MECCA_LON - lon);
    const y = Math.sin(dl) * Math.cos(f2);
    const x = Math.cos(f1) * Math.sin(f2) - Math.sin(f1) * Math.cos(f2) * Math.cos(dl);
    return (toDeg(Math.atan2(y, x)) + 360) % 360;
  }

  function calcDistance(lat, lon) {
    const R = 6371;
    const f1 = toRad(lat), f2 = toRad(MECCA_LAT);
    const df = toRad(MECCA_LAT - lat), dl = toRad(MECCA_LON - lon);
    const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function buildCompassMarks() {
    const ring = document.querySelector('#compassRing svg g[stroke="#d4af37"]');
    let marks = '';
    for (let deg = 0; deg < 360; deg += 5) {
      const isMajor = deg % 30 === 0;
      const isMid = deg % 15 === 0;
      const len = isMajor ? 8 : isMid ? 5 : 3;
      const r1 = 78 - len, r2 = 78;
      const a = toRad(deg - 90);
      const x1 = Math.cos(a) * r1, y1 = Math.sin(a) * r1;
      const x2 = Math.cos(a) * r2, y2 = Math.sin(a) * r2;
      const sw = isMajor ? 1 : isMid ? .6 : .3;
      const op = isMajor ? .9 : isMid ? .6 : .4;
      marks += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke-width="${sw}" opacity="${op}"/>`;
    }
    ring.innerHTML = marks;

    const numsG = document.getElementById('degreeNumbers');
    let nums = '';
    for (let deg = 30; deg < 360; deg += 30) {
      if (deg % 90 === 0) continue;
      const a = toRad(deg - 90);
      const x = Math.cos(a) * 55, y = Math.sin(a) * 55;
      nums += `<text x="${x.toFixed(2)}" y="${y.toFixed(2)}">${deg}</text>`;
    }
    numsG.innerHTML = nums;
  }

  function updateDisplay() {
    const ring = document.getElementById('compassRing');
    const needle = document.getElementById('qiblaNeedle');
    const wrap = document.getElementById('compassWrap');
    const status = document.getElementById('alignmentStatus');
    const headingEl = document.getElementById('currentHeading');

    ring.style.transform = `rotate(${-currentHeading}deg)`;
    const arrowAngle = qiblaBearing - currentHeading;
    needle.style.transform = `rotate(${arrowAngle}deg)`;
    headingEl.textContent = Math.round(currentHeading) + '°';

    const normalized = ((arrowAngle % 360) + 360) % 360;
    const diff = Math.min(normalized, 360 - normalized);

    if (hasOrientation && diff < 4) {
      wrap.classList.add('aligned');
      status.classList.add('aligned');
      status.textContent = '✦ Alineado con La Meca ✦';
    } else if (hasOrientation) {
      wrap.classList.remove('aligned');
      status.classList.remove('aligned');
      const dir = normalized > 0 && normalized < 180 ? 'derecha' : 'izquierda';
      status.textContent = `Gira hacia la ${dir} · ${Math.round(diff)}°`;
    }
  }

  function handleOrientation(event) {
    let heading = null;
    if (typeof event.webkitCompassHeading === 'number') heading = event.webkitCompassHeading;
    else if (event.absolute === true && typeof event.alpha === 'number') heading = (360 - event.alpha) % 360;
    else if (typeof event.alpha === 'number') heading = (360 - event.alpha) % 360;
    if (heading === null) return;
    hasOrientation = true;
    currentHeading = heading;
    updateDisplay();
  }

  async function requestOrientation() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
    }
  }

  function dirName(angle) {
    const names = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
    return names[Math.round(angle / 22.5) % 16];
  }

  function startOrientation() {
    if (orientationStarted) return;
    orientationStarted = true;
    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    }
    window.addEventListener('deviceorientation', handleOrientation, true);

    setTimeout(() => {
      if (!hasOrientation) {
        document.getElementById('noSensorNote').innerHTML =
          '<div class="no-sensor-note">Sin brújula del dispositivo. Apunta hacia el rumbo indicado.</div>';
        document.getElementById('alignmentStatus').textContent =
          `Apunta hacia el ${qiblaBearing.toFixed(0)}° (${dirName(qiblaBearing)})`;
        updateDisplay();
      }
    }, 1500);
  }

  function activateCompass(lat, lon, source) {
    userLat = lat;
    userLon = lon;
    qiblaBearing = calcQiblaBearing(lat, lon);
    const dist = calcDistance(lat, lon);

    document.getElementById('qiblaAngle').textContent = qiblaBearing.toFixed(1) + '°';
    document.getElementById('distance').textContent = Math.round(dist).toLocaleString('es-ES') + ' km';
    document.getElementById('sourceTag').textContent = `${source} · ${lat.toFixed(3)}°, ${lon.toFixed(3)}°`;

    showScreen('screen-compass');
    requestOrientation().then(startOrientation);
    updateDisplay();
  }

  function showStatus(html) { document.getElementById('loc-status').innerHTML = html; }

  function tryGPS() {
    if (!navigator.geolocation) {
      showStatus('<div class="info-box error-box">Tu navegador no soporta geolocalización.</div>');
      return;
    }
    showStatus('<div class="info-box"><span class="spinner"></span>Obteniendo GPS…</div>');
    navigator.geolocation.getCurrentPosition(
      pos => { showStatus(''); activateCompass(pos.coords.latitude, pos.coords.longitude, 'GPS'); },
      err => {
        let msg;
        if (err.code === 1) msg = 'Permiso denegado. Prueba con IP o coordenadas.';
        else if (err.code === 2) msg = 'GPS no disponible.';
        else if (err.code === 3) msg = 'Tardó demasiado.';
        else msg = 'No se pudo obtener el GPS.';
        showStatus(`<div class="info-box error-box">${msg}</div>`);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  }

  async function tryIP() {
    showStatus('<div class="info-box"><span class="spinner"></span>Detectando por IP…</div>');
    try {
      const res = await fetch('https://ipapi.co/json/');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.latitude && data.longitude) {
        showStatus('');
        const place = data.city ? `IP · ${data.city}` : 'IP';
        activateCompass(data.latitude, data.longitude, place);
        return;
      }
      throw new Error('sin coords');
    } catch (e) {
      try {
        const res2 = await fetch('https://geolocation-db.com/json/');
        const d2 = await res2.json();
        if (d2.latitude && d2.longitude && d2.latitude !== 'Not found') {
          showStatus('');
          activateCompass(parseFloat(d2.latitude), parseFloat(d2.longitude), 'IP');
          return;
        }
        throw new Error('sin datos');
      } catch (e2) {
        showStatus('<div class="info-box error-box">No se pudo geolocalizar por IP. Usa coordenadas manuales o un preset.</div>');
      }
    }
  }

  function tryManual() {
    const lat = parseFloat(document.getElementById('in-lat').value);
    const lon = parseFloat(document.getElementById('in-lon').value);
    if (isNaN(lat) || isNaN(lon) || Math.abs(lat) > 90 || Math.abs(lon) > 180) {
      showStatus('<div class="info-box error-box">Coordenadas no válidas.</div>');
      return;
    }
    activateCompass(lat, lon, 'Manual');
  }

  document.getElementById('btn-start').addEventListener('click', () => showScreen('screen-location'));
  document.getElementById('btn-gps').addEventListener('click', tryGPS);
  document.getElementById('btn-ip').addEventListener('click', tryIP);
  document.getElementById('btn-manual').addEventListener('click', tryManual);
  document.getElementById('btn-back').addEventListener('click', () => { showStatus(''); showScreen('screen-location'); });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lat = parseFloat(btn.dataset.lat);
      const lon = parseFloat(btn.dataset.lon);
      if (!isNaN(lat) && !isNaN(lon)) {
        const name = btn.querySelector('strong')?.textContent || 'Preset';
        activateCompass(lat, lon, name);
      }
    });
  });

  ['in-lat', 'in-lon'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') tryManual(); });
  });

  buildCompassMarks();
</script>

</body>
</html>
